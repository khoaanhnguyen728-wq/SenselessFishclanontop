<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Giới thiệu Clan | SenselessFish</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0B3C5D,#328CC1,#0B3C5D);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    text-align:center;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* BUTTON */
.btn{
    padding:14px 30px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#1464A0;
    color:white;
    cursor:pointer;
    transition:.2s;
}
.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 15px #00eaff;
}

/* BUTTON BAR */
.top-btn-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:30px 0;
}

/* CONTENT BOX (TRỐNG) */
.about-box{
    width:80%;
    height:320px;
    margin:40px auto;
    border-radius:22px;
    background:linear-gradient(180deg,#0c2236,#091a2b);
    box-shadow:0 20px 40px rgba(0,0,0,.55);
}
</style>
</head>

<body>

<h1>📘 Giới thiệu Clan</h1>

<div class="top-btn-bar">
    <button class="btn" onclick="location.href='staff.html'">Staff Clan</button>
    <button class="btn" onclick="location.href='top.html'">Top in Clan</button>
    <button class="btn" onclick="location.href='about.html'">Giới thiệu Clan</button>
</div>

<!-- BOX GIỚI THIỆU (ĐỂ TRỐNG ĐÚNG YÊU CẦU) -->
<div class="about-box"></div>

</body>

</html>
