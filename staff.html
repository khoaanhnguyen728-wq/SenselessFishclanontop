.fish-layer{
    position:fixed;
    inset:0;

    pointer-events:none;
    overflow:hidden;
}

.fish{
    position:absolute;
    width:80px;
    height:28px;
    background:rgba(0,0,0,.35);
    border-radius:50%;
    filter:blur(7px);
    opacity:.45;
}

.fish::after{
    content:"";
    position:absolute;
    top:4px;
    width:0;
    height:0;
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
}

/* trái → phải */
.swim-right{
    animation:
        swimRight 30s linear infinite,
        fishFloat 6s ease-in-out infinite;
}
.swim-right::after{
    left:-16px;
    border-right:16px solid rgba(0,0,0,.35);
}
@keyframes swimRight{
    from{transform:translateX(-140px);}
    to{transform:translateX(calc(100vw + 140px));}
}

/* phải → trái */
.swim-left{
    animation:
        swimLeft 34s linear infinite,
        fishFloat 7s ease-in-out infinite;
}
.swim-left::after{
    right:-16px;
    border-left:16px solid rgba(0,0,0,.35);
}
@keyframes swimLeft{
    from{transform:translateX(calc(100vw + 140px));}
    to{transform:translateX(-140px);}
}

<script>
const dolphinLayer = document.getElementById("dolphin-layer");
const dolphinIcon = "🐬";

/* tạo 1 con cá heo */
function spawnDolphin(){
  const d = document.createElement("div");
  d.className = "dolphin";
  d.textContent = dolphinIcon;

  /* random vị trí ngang */
  const x = Math.random() * 100;
  d.style.left = x + "vw";

  /* random size (chiều sâu) */
  const size = Math.random() * 24 + 12; // 12px → 36px
  d.style.fontSize = size + "px";

  /* càng nhỏ càng tối */
  const darkness = Math.max(0.35, size / 36);
  d.style.opacity = darkness;

  /* random thời gian rơi */
  const duration = Math.random() * 6 + 6; // 6s → 12s
  d.style.animationDuration = duration + "s";

  dolphinLayer.appendChild(d);

  /* xóa sau khi rơi xong */
  setTimeout(()=>{
    d.remove();
  }, duration * 1000);
}

/* rơi ít thôi */
setInterval(spawnDolphin, 500);
</script>

<script>
async function loadStaff() {
    const grid = document.getElementById("staffGrid");

    try {
        const res = await fetch("https://senselessfishclanontop-1.onrender.com/staff-realtime?" + Date.now());
        let data = await res.json();

        // ===== map quyền & sort =====
        const rolePriority = {
            "Tryout host": 2,
            "Mod": 3,
            "Training host": 4,
            "Junior Developer": 5,
            "Manager": 6,
            "Referee": 6,
            "Experienced Referee": 7,
            "Developer": 7,
            "Senior Developer": 8,
            "Admin": 9,
            "Owner": 9,
            "Founder": 10,
            "Rank Management": 5
        };

        // ===== sort theo rolePriority =====
        data.sort((a, b) => {
            const aRole = Object.keys(rolePriority).find(r => a.role.includes(r)) || "Mod";
            const bRole = Object.keys(rolePriority).find(r => b.role.includes(r)) || "Mod";
            return rolePriority[bRole] - rolePriority[aRole];
        });

        // ===== update từng card, không xóa grid =====
        const existingCards = {};
        grid.querySelectorAll(".staff-card").forEach(c => {
            existingCards[c.dataset.id] = c;
        });

        data.forEach(s => {
            let card = existingCards[s.id];

            if (!card) {
                card = document.createElement("div");
                card.dataset.id = s.id;
                grid.appendChild(card);
            }

            // map role class cho màu
            let roleClass = "mod";
            if(s.role.includes("Founder")) roleClass = "founder";
            else if(s.role.includes("Owner")) roleClass = "owner";
            else if(s.role.includes("Administrator")) roleClass = "admin";
            else if(s.role.includes("Manager")) roleClass = "manager";
            else if(s.role.includes("DEV")) roleClass = "dev";
            else if(s.role.includes("JUNIOR_DEV")) roleClass = "junior_dev";
            else if(s.role.includes("SENIOR_DEV")) roleClass = "senior_dev";
            else if(s.role.includes("TRAIN")) roleClass = "train";
            else if(s.role.includes("TRYOUT")) roleClass = "tryout";

            card.className = `staff-card ${roleClass}`;

            // set color từ Discord luôn
            if(s.color) card.style.setProperty("--c", s.color);

            card.innerHTML = `
                <div class="avatar" style="background-image:url('${s.avatar}')"></div>
                <div class="role">${s.role}</div>
                <div class="name">@${s.username}</div>
                <a class="view-dis" href="https://discord.com/users/${s.id}" target="_blank">View Discord</a>
            `;
        });

    } catch(err) {
        console.log("Staff load lỗi", err);
    }
}

// ===== load ngay khi mở trang =====
window.addEventListener("DOMContentLoaded", () => {
    loadStaff();           // hiển thị liền
    setInterval(loadStaff, 10000); // cập nhật mỗi 10s nếu có thay đổi
});
</script>
<script>
/* TOOLS MENU */
function toggleTools(){
  const menu = document.getElementById("toolsMenu");
  const arrow = document.getElementById("toolsArrow");

  menu.classList.toggle("active");

  arrow.style.transform = menu.classList.contains("active")
    ? "rotate(180deg)"
    : "rotate(0deg)";
}

/* CLICK OUTSIDE -> CLOSE TOOLS */
document.addEventListener("click", function(e){
  const menu = document.getElementById("toolsMenu");

  if(!menu.contains(e.target)){
    menu.classList.remove("active");
    document.getElementById("toolsArrow").style.transform = "rotate(0deg)";
  }
});

/* ACCOUNT */
function toggleAccount(){
  const box = document.querySelector(".account-box");
  box.classList.toggle("closed");
}

/* AUTO CLOSE ON LOAD */
window.addEventListener("DOMContentLoaded", () => {
  const box = document.querySelector(".account-box");
  if(box){
    box.classList.add("closed");
  }
});
</script>
<script>
const CLIENT_ID = "1476208651835408506";
const REDIRECT_URI = "https://senselessfishclan.pages.dev/staff";
let discordUser = null;

// HÀM QUAN TRỌNG: Kiểm tra và hiển thị thông tin người dùng
async function checkLogin() {
    const urlParams = new URLSearchParams(window.location.hash.substring(1));
    let token = urlParams.get("access_token");

    if (token) {
        localStorage.setItem("discord_token", token);
        window.history.replaceState({}, document.title, window.location.pathname);
    } else {
        token = localStorage.getItem("discord_token");
    }

    if (!token) return;

    try {
        const response = await fetch("https://discord.com/api/users/@me", {
            headers: { Authorization: `Bearer ${token}` }
        });

        if (response.ok) {
            const user = await response.json();

            // UPDATE UI
            document.getElementById("loginStatus").innerText = "🟢 Đã đăng nhập";
            document.getElementById("loginBtn").style.display = "none";
            document.getElementById("logoutBtn").style.display = "block";

            document.getElementById("userInfo").style.display = "block";
            document.getElementById("userName").innerText = user.username;

            const avatarUrl = user.avatar
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                : "https://cdn.discordapp.com/embed/avatars/0.png";

            document.getElementById("userAvatar").src = avatarUrl;

        } else {
            localStorage.removeItem("discord_token");
        }

    } catch (err) {
        console.log("Login lỗi:", err);
    }
}

function loginDiscord() {
    // Chuyển hướng sang trang ủy quyền của Discord
    window.location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=identify`;
}

// Cập nhật lại window.onload để chạy hàm kiểm tra khi vừa mở trang
window.onload = () => {
    checkLogin();
};
function logout(){
    localStorage.removeItem("discord_token");
    location.reload();
}
</script>
