<!DOCTYPE html>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0B3C5D,#328CC1,#0B3C5D);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    text-align:center;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* BUTTON */
.btn{
    padding:14px 30px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#1464A0;
    color:white;
    cursor:pointer;
    transition:.2s;
}
.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 15px #00eaff;
}

/* BUTTON BAR */
.top-btn-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:25px 0;
}

/* GRID */
.staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:28px;
    width:85%;
    margin:30px auto;
}

/* CARD */
.staff-card{
    background:linear-gradient(180deg,#0c2236,#091a2b);
    border-radius:22px;
    padding:22px 20px 26px;
    box-shadow:0 20px 40px rgba(0,0,0,.55);
    transition:.3s;
    position:relative;
}
.staff-card:hover{
    transform:translateY(-12px) scale(1.04);
}

/* AVATAR */
.avatar{
    width:96px;
    height:96px;
    border-radius:50%;
    margin:10px auto 12px;
    background-size:cover;
    background-position:center;
    border:4px solid var(--c);
    box-shadow:0 0 18px var(--c);
}

/* ROLE COLORS */
.founder{--c:#ff2d55}
.owner{--c:gold}
.admin{--c:#ff5555}
.manager{--c:#4dd0ff}
.mod{--c:#55ff8f}

/* ===== GLOW ROLE ĐỘNG ===== */
.founder .avatar{
    animation:glowFounder 2.5s infinite alternate;
}
.owner .avatar{
    animation:glowOwner 2.5s infinite alternate;
}
.admin .avatar{
    animation:glowAdmin 2.5s infinite alternate;
}
.manager .avatar{
    animation:glowManager 2.5s infinite alternate;
}
.mod .avatar{
    animation:glowMod 2.5s infinite alternate;
}

/* KEYFRAMES */
@keyframes glowFounder{
    from{box-shadow:0 0 12px var(--c);}
    to{box-shadow:0 0 30px var(--c);}
}
@keyframes glowOwner{
    from{box-shadow:0 0 12px var(--c);}
    to{box-shadow:0 0 30px var(--c);}
}
@keyframes glowAdmin{
    from{box-shadow:0 0 12px var(--c);}
    to{box-shadow:0 0 30px var(--c);}
}
@keyframes glowManager{
    from{box-shadow:0 0 12px var(--c);}
    to{box-shadow:0 0 30px var(--c);}
}
@keyframes glowMod{
    from{box-shadow:0 0 12px var(--c);}
    to{box-shadow:0 0 30px var(--c);}
}

/* ROLE TEXT */
.role{
    font-weight:bold;
    color:var(--c);
    margin-top:6px;
}
.name{
    font-size:16px;
    margin-top:4px;
}

/* VIEW DISCORD */
.view-dis{
    margin-top:14px;
    display:inline-block;
    padding:8px 20px;
    background:white;
    color:black;
    border-radius:20px;
    font-weight:bold;
    text-decoration:none;
    transition:.2s;
}
.view-dis:hover{
    transform:scale(1.1);
    box-shadow:0 0 18px white;
}
</style>
</head>
