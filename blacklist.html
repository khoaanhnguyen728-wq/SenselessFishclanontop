/* NAVBAR */

body{

/* BUTTON */
.btn{
    padding:14px 30px;

/* GRID */
.staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:28px;
    width:85%;
    margin:30px auto;
}

/* CARD */
.staff-card{
    background:linear-gradient(180deg,#0c2236,#091a2b);
    border-radius:22px;
    padding:22px 20px 26px;
    box-shadow:0 20px 40px rgba(0,0,0,.55);
    transition:.3s;
    position:relative;
}
.staff-card:hover{
    transform:translateY(-12px) scale(1.04);
}

/* AVATAR */
.avatar{
    width:96px;
    height:96px;
    border-radius:50%;
    margin:10px auto 12px;
    background-size:cover;
    background-position:center;
    border:4px solid var(--c);
    box-shadow:0 0 18px var(--c);
}

/* ROLE COLORS */
.founder{--c:#ff2d55}
.owner{--c:gold}
.admin{--c:#ff5555}
.manager{--c:#4dd0ff}
.mod{--c:#55ff8f}

/* ===== GLOW ROLE ĐỘNG ===== */
.founder .avatar{
    animation:glowFounder 2.5s infinite alternate;
}
.owner .avatar{
    animation:glowOwner 2.5s infinite alternate;
}
.admin .avatar{
    animation:glowAdmin 2.5s infinite alternate;
}
.manager .avatar{
    animation:glowManager 2.5s infinite alternate;
}
.mod .avatar{
    animation:glowMod 2.5s infinite alternate;
}

    from{box-shadow:0 0 12px var(--c);}
    to{box-shadow:0 0 30px var(--c);}
}
@keyframes glowOwner{
    from{box-shadow:0 0 12px var(--c);}

}
@keyframes glowManager{

/* ===== FISH BACKGROUND === */
/* ========================= */
.fish-layer{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
}

.fish{
    position:absolute;
    width:80px;
    height:28px;
    background:rgba(0,0,0,.35);
    border-radius:50%;
    filter:blur(7px);
    opacity:.45;
}

.fish::after{
    content:"";
    position:absolute;
    top:4px;
    width:0;
    height:0;
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
}

/* trái → phải */
.swim-right{
    animation:
        swimRight 30s linear infinite,
        fishFloat 6s ease-in-out infinite;
}
.swim-right::after{
    left:-16px;
    border-right:16px solid rgba(0,0,0,.35);
}
@keyframes swimRight{
    from{transform:translateX(-140px);}
    to{transform:translateX(calc(100vw + 140px));}
}

/* phải → trái */
.swim-left{
    animation:
        swimLeft 34s linear infinite,
        fishFloat 7s ease-in-out infinite;
}
.swim-left::after{
    right:-16px;
    border-left:16px solid rgba(0,0,0,.35);
}
@keyframes swimLeft{
    from{transform:translateX(calc(100vw + 140px));}
    to{transform:translateX(-140px);}
}

/* lượn lên xuống */
@keyframes fishFloat{
    0%{translate:0 0}
    50%{translate:0 -12px}
    100%{translate:0 0}
}

<script>
// LOAD DATA
async function load(){
  try{
    const res = await fetch("https://senselessfishclanontop-1.onrender.com/blacklist");
    const data = await res.json();

    let html = "";

    data.forEach(u=>{
  html += `
    <div class="item">
      <div>
        🚫 <b>${u.name}</b><br>
        <small>${u.reason}</small>
      </div>
      <div style="font-size:12px;opacity:.7">
        ${u.time}
      </div>
    </div>
  `;
});

    document.getElementById("list").innerHTML = html || "Không có ai";
  }catch{
    document.getElementById("list").innerText = "Lỗi load API";
  }
}

load();

/* ACCOUNT */
function toggleAccount(){
  const box = document.querySelector(".account-box");
  box.classList.toggle("closed");
}

window.addEventListener("DOMContentLoaded", () => {
  document.querySelector(".account-box")?.classList.add("closed");
});

/* TOOLS CLICK */
function toggleTools(){
  const menu = document.getElementById("toolsMenu");
  const arrow = document.getElementById("toolsArrow");

  menu.classList.toggle("active");

  arrow.style.transform = menu.classList.contains("active")
    ? "rotate(180deg)"
    : "rotate(0deg)";
}

/* CLICK OUTSIDE */
document.addEventListener("click",(e)=>{
  const menu = document.getElementById("toolsMenu");

  if(menu && !menu.contains(e.target)){
    menu.classList.remove("active");
    document.getElementById("toolsArrow").style.transform = "rotate(0deg)";
  }
});
</script>
<script>
const CLIENT_ID = "1476208651835408506";
const REDIRECT_URI = "https://senselessfishclan.pages.dev/about";
let discordUser = null;

// HÀM QUAN TRỌNG: Kiểm tra và hiển thị thông tin người dùng
async function checkLogin() {
    const urlParams = new URLSearchParams(window.location.hash.substring(1));
    let token = urlParams.get("access_token");

    if (token) {
        localStorage.setItem("discord_token", token);
        window.history.replaceState({}, document.title, window.location.pathname);
    } else {
        token = localStorage.getItem("discord_token");
    }

    if (!token) return;

    try {
        const response = await fetch("https://discord.com/api/users/@me", {
            headers: { Authorization: `Bearer ${token}` }
        });

        if (response.ok) {
            const user = await response.json();

            // UPDATE UI
            document.getElementById("loginStatus").innerText = "🟢 Đã đăng nhập";
            document.getElementById("loginBtn").style.display = "none";
            document.getElementById("logoutBtn").style.display = "block";

            document.getElementById("userInfo").style.display = "block";
            document.getElementById("userName").innerText = user.username;

            const avatarUrl = user.avatar
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                : "https://cdn.discordapp.com/embed/avatars/0.png";

            document.getElementById("userAvatar").src = avatarUrl;

        } else {
            localStorage.removeItem("discord_token");
        }

    } catch (err) {
        console.log("Login lỗi:", err);
    }
}

function loginDiscord() {
    // Chuyển hướng sang trang ủy quyền của Discord
    window.location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=identify`;
}

// Cập nhật lại window.onload để chạy hàm kiểm tra khi vừa mở trang
window.onload = () => {
    checkLogin();
};
function logout(){
    localStorage.removeItem("discord_token");
    location.reload();
}
</script>
