    💬
</div>
<script>
const dolphinLayer = document.getElementById("dolphin-layer");
const dolphinIcon = "🐬";

/* tạo 1 con cá heo */
function spawnDolphin(){
  const d = document.createElement("div");
  d.className = "dolphin";
  d.textContent = dolphinIcon;

  /* random vị trí ngang */
  const x = Math.random() * 100;
  d.style.left = x + "vw";

  /* random size (chiều sâu) */
  const size = Math.random() * 24 + 12; // 12px → 36px
  d.style.fontSize = size + "px";

  /* càng nhỏ càng tối */
  const darkness = Math.max(0.35, size / 36);
  d.style.opacity = darkness;

  /* random thời gian rơi */
  const duration = Math.random() * 6 + 6; // 6s → 12s
  d.style.animationDuration = duration + "s";

  dolphinLayer.appendChild(d);

  /* xóa sau khi rơi xong */
  setTimeout(()=>{
    d.remove();
  }, duration * 1000);
}

/* rơi ít thôi */
setInterval(spawnDolphin, 500);
</script>
<script>

async function loadMainers(){

const res = await fetch("https://senselessfishclanontop-1.onrender.com/mainers");
const data = await res.json();

const container = document.getElementById("mainers");
container.innerHTML="";

data.forEach(m=>{

container.innerHTML += `
<div class="staff-card">

<img class="avatar" src="${m.avatar}" alt="${m.name}">

<div class="name">@${m.name}</div>

<a class="view-dis" href="${m.profile}" target="_blank">
View Mainers
</a>

</div>
`;

});

}

loadMainers();

</script>
</div>
<script>
/* TOOLS MENU */
function toggleTools(){
  const menu = document.getElementById("toolsMenu");
  const arrow = document.getElementById("toolsArrow");

  menu.classList.toggle("active");

  arrow.style.transform = menu.classList.contains("active")
    ? "rotate(180deg)"
    : "rotate(0deg)";
}

/* CLICK OUTSIDE -> CLOSE TOOLS */
document.addEventListener("click", function(e){
  const menu = document.getElementById("toolsMenu");

  if(!menu.contains(e.target)){
    menu.classList.remove("active");
    document.getElementById("toolsArrow").style.transform = "rotate(0deg)";
  }
});

/* ACCOUNT */
function toggleAccount(){
  const box = document.querySelector(".account-box");
  box.classList.toggle("closed");
}

/* AUTO CLOSE ON LOAD */
window.addEventListener("DOMContentLoaded", () => {
  const box = document.querySelector(".account-box");
  if(box){
    box.classList.add("closed");
  }
});
</script>
