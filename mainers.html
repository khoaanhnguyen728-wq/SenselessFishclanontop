<!DOCTYPE html>

<title>Mainers List | SenselessFish</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0B3C5D,#328CC1,#0B3C5D);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    text-align:center;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* BUTTON */
.btn{
    padding:14px 30px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#1464A0;
    color:white;
    cursor:pointer;
    transition:.2s;
}
.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 15px #00eaff;
}

.staff-card{
    background:linear-gradient(180deg,#0c2236,#091a2b);
    border-radius:20px;
    padding:20px;
    width:220px;
    height:220px;              /* ← QUAN TRỌNG */
    box-shadow:0 20px 40px rgba(0,0,0,.55);
    transition:.3s;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
}
.staff-card:hover{
    transform:translateY(-10px) scale(1.05);
}
.staff-card:hover{
    transform:translateY(-12px) scale(1.04);
}
.staff-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, 220px);
    gap:50px;                 /* ← tăng mạnh khoảng cách */
    justify-content:center;
    width:90%;
    margin:50px auto;
}
.staff-card{
    border-radius:20px;
    overflow:hidden;          /* ← tránh shadow chồng */
}

/* NAME */
.name{
    font-size:20px;
    font-weight:bold;
    color:#b26bff;
    margin-bottom:16px;
}

/* VIEW DISCORD */
.view-dis{
    display:inline-block;
    padding:10px 26px;
    background:white;
    color:black;
    border-radius:20px;
    font-weight:bold;
    text-decoration:none;
    transition:.2s;
}
.view-dis:hover{
    transform:scale(1.1);
    box-shadow:0 0 18px white;
}
/* Hover (PC) */
#discordJoin:hover{
    transform:translateX(-50%) scale(1.12);
    box-shadow:
        0 12px 28px rgba(88,101,242,.9),
        0 0 30px rgba(88,101,242,1);
}
/* ===== DISCORD FLOAT BUTTON ===== */
#discordJoin{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    width:52px;
    height:52px;

    background:#5865F2;
    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
    cursor:pointer;
    z-index:20;

    box-shadow:
        0 8px 20px rgba(88,101,242,.6),
        0 0 18px rgba(88,101,242,.8);

    animation:
        discordFloat 2.6s ease-in-out infinite,
        discordGlow 1.8s ease-in-out infinite;

    transition:.25s;
}

/* Hover (PC) */
#discordJoin:hover{
    transform:translateX(-50%) scale(1.12);
    box-shadow:
        0 12px 28px rgba(88,101,242,.9),
        0 0 30px rgba(88,101,242,1);
}

/* ===== DISCORD FLOAT BUTTON ===== */
#discordJoin{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    width:52px;
    height:52px;

    background:#5865F2;
    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
    cursor:pointer;
    z-index:20;

    box-shadow:
        0 8px 20px rgba(88,101,242,.6),
        0 0 18px rgba(88,101,242,.8);

    animation:
        discordFloat 2.6s ease-in-out infinite,
        discordGlow 1.8s ease-in-out infinite;

    transition:.25s;
}

/* Hover (PC) */
#discordJoin:hover{
    transform:translateX(-50%) scale(1.12);
    box-shadow:
        0 12px 28px rgba(88,101,242,.9),
        0 0 30px rgba(88,101,242,1);
}

/* ===== FLOAT UP DOWN ===== */
@keyframes discordFloat{
    0%   { transform:translateX(-50%) translateY(0); }
    50%  { transform:translateX(-50%) translateY(-10px); }
    100% { transform:translateX(-50%) translateY(0); }
}

/* ===== GLOW PULSE ===== */
@keyframes discordGlow{
    0%{
        box-shadow:
            0 6px 18px rgba(88,101,242,.6),
            0 0 12px rgba(88,101,242,.7);
    }
    50%{
        box-shadow:
            0 12px 30px rgba(88,101,242,.9),
            0 0 28px rgba(88,101,242,1);
    }
    100%{
        box-shadow:
            0 6px 18px rgba(88,101,242,.6),
            0 0 12px rgba(88,101,242,.7);
    }
}

.nav-center{

  gap:22px;
}

  font-weight:600;

  padding:8px 14px;

  box-shadow:0 0 12px rgba(0,234,255,.6);
  transform:translateY(-2px);
}
