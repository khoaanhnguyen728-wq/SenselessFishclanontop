<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Senseless Fish</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0B3C5D,#328CC1,#0B3C5D);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    text-align:center;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* BRAND */
#brand{
    position:fixed;
    top:16px;
    right:22px;
    font-size:38px;
    font-weight:900;
    background:linear-gradient(135deg,#00eaff,#1e90ff,#9d4edd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(0,234,255,.9);
    animation:brandFloat 3s ease-in-out infinite;
    pointer-events:none;
    z-index:5;
}

@keyframes brandFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
    100%{transform:translateY(0)}
}

/* STATS */
#statsBox{
    position:fixed;
    top:15px;
    left:15px;
    background:rgba(0,0,0,.6);
    padding:10px 15px;
    border-radius:10px;
    z-index:5;
}

/* LOGO */
#logo{
    width:160px;
    height:160px;
    margin:30px auto;
    border-radius:50%;
    background:url("images/Senselessfish.png") center/cover;
    border:5px solid white;
    box-shadow:0 0 20px white;
    cursor:pointer;
    transition:.2s;
    position:relative;
    z-index:10;
}

#logo:hover{
    box-shadow:0 0 35px #00eaff;
    transform:scale(1.05);
}

/* BUTTON */
.btn{
    padding:14px 30px;
    border:none;
    border-radius:8px;
    background:#1464A0;
    color:white;
    cursor:pointer;
    transition:.2s;
    text-decoration:none;
    display:inline-block;
}

.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 15px #00eaff;
}

/* BUTTON BAR */
.top-btn-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
    position:relative;
    z-index:10;
}

/* TOP */
/* Animation bay bổng cho cả cột giống Discord */
@keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-15px); }
}

.top-wrapper {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 35px;
    margin-top: 60px; /* Giảm lề trên vì không còn vương miện */
    padding: 20px;
}

.top-card {
    width: 220px;
    border-radius: 25px;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 15px;
    position: relative;
    animation: float 4s ease-in-out infinite;
    box-shadow: 0 15px 35px rgba(0,0,0,0.4);
    overflow: hidden; /* Giữ hiệu ứng ánh sáng bên trong card */
}

/* Chiều cao: Top 1 cao nhất, Top 2 và 3 bằng nhau */
.top-1 { 
    height: 380px; 
    background: linear-gradient(180deg, #ff9d00, #d48400); 
    z-index: 10; 
    border: 3px solid gold; 
}
.top-2 { 
    height: 310px; 
    background: linear-gradient(180deg, #a8a8a8, #757575); 
    animation-delay: 0.5s; 
    border: 3px solid silver; 
}
.top-3 { 
    height: 310px; /* Đã kéo cao bằng Top 2 */
    background: linear-gradient(180deg, #964b00, #633200); 
    animation-delay: 1s; 
    border: 3px solid #cd7f32; 
}

/* Avatar fix kích thước */
.avatar {
    width: 120px;
    height: 120px;
    border-radius: 50%;
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border: 5px solid white;
    margin-bottom: 15px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

/* Nút Discord Profile đậm và rõ */
.view-profile {
    margin-top: auto;
    width: 100%;
    padding: 12px;
    border-radius: 12px;
    border: none;
    background: #454FBF; 
    color: white;
    font-weight: 900;
    text-transform: uppercase;
    cursor: pointer;
    box-shadow: 0 4px 0 #2f358a;
    transition: 0.2s;
}
.view-profile:hover {
    background: #5865F2;
    transform: translateY(-2px);
    box-shadow: 0 6px 0 #2f358a;
}

.view-profile:active {
    transform: translateY(2px);
    box-shadow: 0 0 0 #3b44a3;
}

/* Tên thành viên */
.name {
    font-size: 20px;
    font-weight: bold;
    color: #fff;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
    margin-bottom: 10px;
}

/* GLOW */
@keyframes glowPulse{
    0%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
    50%{box-shadow:0 0 25px var(--c),0 0 50px var(--c)}
    100%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
}

.avatar.gold{--c:gold;border:5px solid gold;animation:glowPulse 2.5s infinite}
.avatar.silver{--c:silver;border:5px solid silver;animation:glowPulse 2.8s infinite}
.avatar.bronze{--c:#cd7f32;border:5px solid #cd7f32;animation:glowPulse 3s infinite}

/* CROWN */
.crown-wrap{
    position:absolute;
    top:-32px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    z-index:50;
    pointer-events:none;
}
.top-1{
    position: relative;
    overflow: visible;
}

.crown{
    position: absolute;
    top: -55px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 38px;
    z-index: 999;
    pointer-events: none;

    animation:
        crownFloat 2.5s ease-in-out infinite,
        crownGlow 1.8s ease-in-out infinite;
}
@keyframes crownFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-5px)}
    100%{transform:translateY(0)}
}

/* RANK */
.rank{
    width:36px;
    height:36px;
    border-radius:50%;
    margin:8px auto 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:black;
}

.gold{background:gold}
.silver{background:silver}
.bronze{background:#cd7f32}

.name{font-size:18px;font-weight:bold}
.stage{font-size:14px;color:#ffd966}

/* LIST */
.rank-list{
    width:100%;
    max-width:900px;
    margin:40px auto;
}

.rank-row{
    display:flex;
    align-items:center;
    width:100%;
    gap:14px;
    padding:12px 18px;
    background:rgba(0,0,0,.45);
    border-radius:12px;
    margin-bottom:8px;
}

/* ===== DISCORD FLOAT BUTTON ===== */
#discordJoin{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    width:52px;
    height:52px;

    background:#5865F2;
    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
    cursor:pointer;
    z-index:20;

    box-shadow:
        0 8px 20px rgba(88,101,242,.6),
        0 0 18px rgba(88,101,242,.8);

    animation:
        discordFloat 2.6s ease-in-out infinite,
        discordGlow 1.8s ease-in-out infinite;

    transition:.25s;
}

/* Hover (PC) */
#discordJoin:hover{
    transform:translateX(-50%) scale(1.12);
    box-shadow:
        0 12px 28px rgba(88,101,242,.9),
        0 0 30px rgba(88,101,242,1);
}

/* ===== FLOAT UP DOWN ===== */
@keyframes discordFloat{
    0%   { transform:translateX(-50%) translateY(0); }
    50%  { transform:translateX(-50%) translateY(-10px); }
    100% { transform:translateX(-50%) translateY(0); }
}

/* ===== GLOW PULSE ===== */
@keyframes discordGlow{
    0%{
        box-shadow:
            0 6px 18px rgba(88,101,242,.6),
            0 0 12px rgba(88,101,242,.7);
    }
    50%{
        box-shadow:
            0 12px 30px rgba(88,101,242,.9),
            0 0 28px rgba(88,101,242,1);
    }
    100%{
        box-shadow:
            0 6px 18px rgba(88,101,242,.6),
            0 0 12px rgba(88,101,242,.7);
    }
  }
.rank-list,
.rank-row{
    text-align:left;
}
/* ===== SHINY EFFECT ===== */
/* ===== SHINE VERTICAL ===== */
@keyframes shineDiagonal {
    0% {
        left: -120%;
        top: -120%;
        opacity: 0;
    }
    30% {
        opacity: .4;
    }
    50% {
        left: 120%;
        top: 120%;
        opacity: .25;
    }
    80% {
        opacity: .4;
    }
    100% {
        left: -120%;
        top: -120%;
        opacity: 0;
    }
}

.top-card::after{
    content:"";
    position:absolute;
    top:-120%;
    left:-120%;
    width:200%;
    height:200%;

    background:linear-gradient(
        135deg,
        transparent 40%,
        rgba(255,255,255,.35) 50%,
        transparent 60%
    );

    animation: shineDiagonal 4.5s ease-in-out infinite;
    pointer-events:none;
}
.top-card{
    position:relative;
    overflow:hidden;      /* khóa ánh sáng */
    border-radius:22px;
}
/* ===== TOP 1 STYLE ===== */
.top-1{
    background:linear-gradient(135deg,#3a2c00,#ffd700,#3a2c00);
    box-shadow:
        0 0 25px gold,
        0 0 80px rgba(255,215,0,.7);
    border:2px solid gold;
}

/* ===== TOP 2 STYLE ===== */
.top-2{
    background:linear-gradient(135deg,#1c1c1c,#cfd2d6,#1c1c1c);
    box-shadow:
        0 0 20px silver,
        0 0 45px rgba(220,220,220,.6);
    border:2px solid silver;
}

/* ===== TOP 3 STYLE ===== */
.top-3{
    background:linear-gradient(135deg,#2a1600,#cd7f32,#2a1600);
    box-shadow:
        0 0 18px #cd7f32,
        0 0 40px rgba(205,127,50,.6);
    border:2px solid #cd7f32;

}
@keyframes shineVertical{
    0%{top:-120%;opacity:0}
    20%{opacity:.4}
    50%{top:120%;opacity:.25}
    80%{opacity:.4}
    100%{top:-120%;opacity:0}

}
@keyframes crown{
    0%{transform:translateX(-50%) translateY(0)}
    50%{transform:translateX(-50%) translateY(-4px)}
    100%{transform:translateX(-50%) translateY(0)}
}

.top-1 .crown{
    animation:crownFloat 2.5s ease-in-out infinite;;
}
.avatar-wrap{
    position:relative;
    width:110px;
    margin:0 auto;
}
.top-slot{
    position:relative;
    width:260px;          /* đúng bằng card */
    margin:0 auto;
}
#floating-crown{
    position:fixed;              /* QUAN TRỌNG */
    font-size:36px;
    z-index:9999;
    pointer-events:none;

    animation:crownFloat 2.5s ease-in-out infinite;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.6));
    text-shadow:
        0 0 12px gold,
        0 0 28px rgba(255,215,0,.9);
}

@keyframes crown{
    0%{transform:translate(-50%,0)}
    50%{transform:translate(-50%,-6px)}
    100%{transform:translate(-50%,0)}
}
@keyframes crownFloat {
    0% {
        transform: translateX(-50%) translateY(0);
    }
    50% {
        transform: translateX(-50%) translateY(-8px);
    }
    100% {
        transform: translateX(-50%) translateY(0);
    }
}

.crown{
    position: absolute;
    top: -55px;
    left: 50%;
    font-size: 38px;
    z-index: 999;
    pointer-events: none;

    animation: crownFloat 2.5s ease-in-out infinite;

    text-shadow:
        0 0 10px gold,
        0 0 25px rgba(255,215,0,.9);
}
@keyframes crownGlow {
    0% {
        filter: drop-shadow(0 0 6px gold);
    }
    50% {
        filter: drop-shadow(0 0 16px gold);
    }
    100% {
        filter: drop-shadow(0 0 6px gold);
    }
}
/* ===== MOBILE OPTIMIZATION ===== */
@media (max-width: 768px){

  body{
    font-size:14px;
  }

  /* BRAND nhỏ lại */
  #brand{
    font-size:24px;
    top:10px;
    right:12px;
  }

  /* STATS gọn */
  #statsBox{
    font-size:12px;
    padding:8px 10px;
  }

  /* LOGO nhỏ */
  #logo{
    width:120px;
    height:120px;
    margin:20px auto;
  }

  /* BUTTON BAR xuống dòng */
  .top-btn-bar{
    flex-wrap:wrap;
    gap:10px;
  }
  .btn{
    padding:10px 18px;
    font-size:13px;
  }

  /* ===== TOP 1–2–3 STACK ===== */
  .top-wrapper{
    flex-direction:column;
    align-items:center;
    gap:22px;
  }

  .top-card{
    width:210px;
    min-width:210px; /* tránh bóp ngang */
}

  /* TOP 1 nổi bật */
  .top-1{
    transform:none;
    order:-1;
  }

  .crown{
    top:-45px;
    font-size:32px;
  }

  /* AVATAR nhỏ lại */
  .avatar{
    width:115px;
    height:115px;

    border-radius:50%;

    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;

    border:5px solid white;

    margin-bottom:15px;

    box-shadow:0 8px 20px rgba(0,0,0,0.3);

    flex-shrink:0; /* chống bị kéo */
}

  /* VIEW PROFILE dễ bấm */
  .view-profile{
    width:100%;
    margin-top:12px;
    padding:10px;
    font-size:14px;
  }

  /* ===== RANK LIST ===== */
  .rank-row{
    padding:14px;
    font-size:13px;
  }
}
@media (max-width: 768px){
  .top-card::after{
    animation:none; /* tắt shine nặng */
  }
}
@media (max-width:768px){
  #discordJoin{
    width:56px;
    height:56px;
    font-size:24px;
    bottom:18px;
  }
}
.register-box {
  width: 260px;
  background: rgba(0,0,0,0.35);
  padding: 15px;
  border-radius: 15px;
  color: white;
}

.register-box input {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 8px;
  border: none;
}

.register-box button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #5865F2;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.register-box button:hover {
  background: #404EED;
}
@media (max-width: 768px) {
  .register-box {
    position: static;
    margin: 20px auto;
  }
}
/* ===== NAVBAR GRADIENT ===== */
.navbar{
  position: fixed;
  top: 0;

  /* xích sang trái nhẹ */
  left: 50%;
  transform: translateX(calc(-50% - 60px));

  width: 95%;
  max-width: 1200px;
  height: 64px;

  /* GRADIENT */
  background: linear-gradient(
    135deg,
    rgba(10,20,40,.95),
    rgba(30,60,120,.9),
    rgba(10,20,40,.95)
  );

  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 0 22px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  z-index: 9999;

  box-shadow:
    0 10px 30px rgba(0,0,0,.6),
    0 0 25px rgba(30,144,255,.4);
}

/* tránh che nội dung */
.nav-space{
  height: 92px;
}
/* LOGO */
.nav-logo{
  height:42px;
  cursor:pointer;
  transition:.25s;
}
.nav-logo:hover{
  transform:scale(1.08);
  filter:drop-shadow(0 0 10px #00eaff);
}

/* MENU */
.nav-center{
  display:flex;
  gap:22px;
}

.nav-item{
  color:#ddd;
  text-decoration:none;
  font-size:15px;
  font-weight:600;

  display:flex;
  align-items:center;
  gap:6px;

  padding:8px 14px;
  border-radius:12px;
  transition:.25s;
}

.nav-item:hover{
  background:rgb(26, 82, 204);
  color:#00eaff;
  box-shadow:0 0 12px rgba(0,234,255,.6);
  transform:translateY(-2px);
}

/* ===== MOBILE ===== */
@media (max-width:768px){
  .navbar{
    height:auto;
    padding:12px;
  }
  .nav-center{
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
  }
  .nav-item{
    font-size:13px;
    padding:6px 10px;
  }
}
.navbar::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  padding:1px;
  background:linear-gradient(135deg,#00eaff,#1e90ff,#9d4edd);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
  pointer-events:none;
}
/* ========================= */
/* ===== FISH BACKGROUND === */
/* ========================= */
.fish-layer{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
}

.fish{
    position:absolute;
    width:80px;
    height:28px;
    background:rgba(0,0,0,.35);
    border-radius:50%;
    filter:blur(7px);
    opacity:.45;
}

.fish::after{
    content:"";
    position:absolute;
    top:4px;
    width:0;
    height:0;
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
}

/* trái → phải */
.swim-right{
    animation:
        swimRight 30s linear infinite,
        fishFloat 6s ease-in-out infinite;
}
.swim-right::after{
    left:-16px;
    border-right:16px solid rgba(0,0,0,.35);
}
@keyframes swimRight{
    from{transform:translateX(-140px);}
    to{transform:translateX(calc(100vw + 140px));}
}

/* phải → trái */
.swim-left{
    animation:
        swimLeft 34s linear infinite,
        fishFloat 7s ease-in-out infinite;
}
.swim-left::after{
    right:-16px;
    border-left:16px solid rgba(0,0,0,.35);
}
@keyframes swimLeft{
    from{transform:translateX(calc(100vw + 140px));}
    to{transform:translateX(-140px);}
}

/* lượn lên xuống */
@keyframes fishFloat{
    0%{translate:0 0}
    50%{translate:0 -12px}
    100%{translate:0 0}
}
/* ===== FLOATING GIF BUTTON ===== */
.gif-float{
    position:fixed;
    bottom:20px;
    right:20px;
    width:70px;          /* chỉnh size */
    height:70px;
    z-index:9999;
    cursor:pointer;
    transition:.25s;
}

.gif-float img{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:14px;
    box-shadow:
        0 8px 20px rgba(0,0,0,.6),
        0 0 20px rgba(0,200,255,.6);
}

/* hover */
.gif-float:hover{
    transform:scale(1.12);
}

/* hiệu ứng lượn nhẹ (optional) */
.gif-float{
    animation: gifFloat 3s ease-in-out infinite;
}

@keyframes gifFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
    100%{transform:translateY(0)}
}
/* ===== REGISTER LEFT - RIGHT ===== */
.register-wrapper{
  position: fixed;
  top: 120px;
  right: 25px;
  display: flex;
  gap: 20px;
  z-index: 9998;
}

.register-wrapper .register-box{
  width: 260px;
}

/* MOBILE */
@media (max-width:768px){
  .register-wrapper{
    position: static;
    flex-direction: column;
    margin: 20px auto;
  }
}
/* ===== STAGE SELECT ===== */
.stage-box{
  margin: 10px 0;
}

.stage-box label{
  display: block;
  margin-bottom: 6px;
  font-weight: bold;
  color: #e5e7eb;
}

#accStage{
  width: 100%;
  padding: 10px 12px;
  border-radius: 8px;
  border: 2px solid #334155;
  background: #020617;
  color: #e5e7eb;
  font-size: 14px;
  cursor: pointer;
  transition: all .2s ease;
}

#accStage:hover{
  border-color: #22c55e;
}

#accStage:focus{
  outline: none;
  border-color: #22c55e;
  box-shadow: 0 0 0 2px rgba(34,197,94,.3);
}

#accStage option{
  background: #020617;
  color: #e5e7eb;
}
#music-player{
  position:fixed;
  bottom:18px;
  left:18px;
  display:flex;
  align-items:center;
  gap:10px;

  background:rgba(0,0,0,.6);
  padding:10px 14px;
  border-radius:16px;
  z-index:9999;
}

#soundToggle{
  width:42px;
  height:42px;
  border-radius:50%;
  background:#1e90ff;
  color:#fff;
  font-size:22px;

  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
}

#soundToggle.muted{
  background:#ef4444;
}

#volumeSlider{
  width:110px;
  cursor:pointer;
}
/* ===== DOLPHINS ===== */
#dolphin-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;
  z-index:5; /* dưới icon nhạc */
}

.dolphin{
  position:absolute;
  top:-60px;
  user-select:none;
  animation: fall linear forwards;
}

/* animation rơi */
@keyframes fall{
  to{
    transform: translateY(110vh);
  }
}
/* ===== TOOLS DROPDOWN ===== */
.nav-tools{
  position:relative;

<script>
const CLIENT_ID = "1476208651835408506";

let discordUser = null;

// HÀM QUAN TRỌNG: Kiểm tra và hiển thị thông tin người dùng
async function checkLogin() {
    // 1. Lấy token từ URL (sau khi Discord chuyển hướng về) hoặc từ bộ nhớ máy (LocalStorage)
    const urlParams = new URLSearchParams(window.location.hash.substring(1));
    let token = urlParams.get("access_token");

    if (token) {
        localStorage.setItem("discord_token", token);
        // Xóa token trên URL để bảo mật và làm sạch link
        window.history.replaceState({}, document.title, window.location.pathname);
    } else {
        token = localStorage.getItem("discord_token");
    }

    if (!token) return; // Nếu không có token thì thoát

    try {
        // 2. Gọi API Discord để lấy thông tin tài khoản
        const response = await fetch("https://discord.com/api/users/@me", {
            headers: { Authorization: `Bearer ${token}` }
        });

        if (response.ok) {
            const user = await response.json();
            discordUser = user;

            // 3. Cập nhật giao diện Web
            document.getElementById("loginStatus").innerText = "🟢 Đã đăng nhập";
            document.getElementById("registerStatus").innerText = "🟢 Sẵn sàng";
            document.getElementById("loginBox").style.display = "none";
            document.getElementById("userBox").style.display = "block";
            document.getElementById("userName").innerText = user.username;
            
            // Hiển thị ảnh đại diện Discord
            const avatarUrl = user.avatar 
                ? `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
                : "https://cdn.discordapp.com/embed/avatars/0.png";
            document.getElementById("userAvatar").src = avatarUrl;
        } else {
            // Nếu token hết hạn hoặc lỗi
            localStorage.removeItem("discord_token");
        }
    } catch (err) {
        console.error("Lỗi Login Discord:", err);
    }
}

function loginDiscord() {
    // Chuyển hướng sang trang ủy quyền của Discord
    window.location.href = `https://discord.com/oauth2/authorize?client_id=${CLIENT_ID}&response_type=token&redirect_uri=${encodeURIComponent(REDIRECT_URI)}&scope=identify`;
}

// Cập nhật lại window.onload để chạy hàm kiểm tra khi vừa mở trang
window.onload = () => {
    loadTop();   // Hàm tải bảng xếp hạng đã có của bạn
    checkLogin(); // Kiểm tra đăng nhập
};

async function registerStage() {
    // 1. Kiểm tra xem người dùng đã login Discord chưa
    if (!discordUser) {
        alert("Bạn phải Đăng nhập Discord trước khi đăng ký!");
        return;
    }

    // 2. Lấy giá trị từ ô chọn Stage
    const stageSelect = document.getElementById("stage");
    const stageValue = stageSelect.value;

    if (!stageValue) {
        alert("Vui lòng chọn một Stage để thi đấu!");
        return;
    }

    // 3. Hiển thị trạng thái đang gửi
    const btn = document.querySelector(".btn-register");
    const originalText = btn.innerText;
    btn.innerText = "Đang gửi...";
    btn.disabled = true;

    try {
        // 4. Gửi yêu cầu đến API Render của bạn
        const response = await fetch("https://senselessfishclanontop-1.onrender.com/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                discord: `${discordUser.username}#${discordUser.discriminator || '0'}`,
                robloxId: "N/A", // Bạn có thể thêm ô nhập Roblox ID nếu muốn
                stage: stageValue,
                time: new Date().toLocaleString("vi-VN")
            })
        });

        const result = await response.json();

        if (result.success) {
            alert("✅ Đã gửi đơn đăng ký thành công vào Discord!");
        } else {
            alert("❌ Lỗi từ server: " + (result.error || "Không rõ nguyên nhân"));
        }
    } catch (err) {
        console.error("Lỗi kết nối:", err);
        alert("❌ Không thể kết nối đến server. Hãy kiểm tra xem server Render có đang chạy không!");
    } finally {
        btn.innerText = originalText;
        btn.disabled = false;
    }
}

<script>
let player;

function onYouTubeIframeAPIReady(){
  player = new YT.Player('yt-player',{
    height:'0',
    width:'0',
    videoId:'G-9EEDWvg9E',
    playerVars:{
      autoplay:0,
      loop:1,
      playlist:'G-9EEDWvg9E',
      controls:0
    },
    events:{
      onReady:()=>{
        player.setVolume(100);
      }
    }
  });
}

/* click lần đầu để phát nhạc */
document.addEventListener("click",()=>{
  if(started || !player) return;
  player.playVideo();
  started = true;
});

/* icon loa */
soundToggle.onclick = ()=>{
  if(!player) return;

  if(!started){
    player.playVideo();
    started = true;
  }

  isMuted = !isMuted;

  if(isMuted){
    player.mute();
    volumeSlider.value = 0;
    soundToggle.textContent = "🔇";
    soundToggle.classList.add("muted");
  }else{
    player.unMute();
    player.setVolume(100);
    volumeSlider.value = 100;
    soundToggle.textContent = "🔊";
    soundToggle.classList.remove("muted");
  }
};

/* slider âm lượng */
volumeSlider.addEventListener("input",()=>{
  if(!player) return;

  const v = volumeSlider.value;
  player.setVolume(v);

  if(v == 0){
    player.mute();
    soundToggle.textContent = "🔇";
    soundToggle.classList.add("muted");
    isMuted = true;
  }else{
    player.unMute();
    soundToggle.textContent = "🔊";
    soundToggle.classList.remove("muted");
    isMuted = false;
  }
});
</script>
