<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Senseless Fish</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0B3C5D,#328CC1,#0B3C5D);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    text-align:center;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* BRAND */
#brand{
    position:fixed;
    top:16px;
    right:22px;
    font-size:38px;
    font-weight:900;
    background:linear-gradient(135deg,#00eaff,#1e90ff,#9d4edd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(0,234,255,.9);
    animation:brandFloat 3s ease-in-out infinite;
    pointer-events:none;
    z-index:5;
}

@keyframes brandFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
    100%{transform:translateY(0)}
}

/* STATS */
#statsBox{
    position:fixed;
    top:15px;
    left:15px;
    background:rgba(0,0,0,.6);
    padding:10px 15px;
    border-radius:10px;
    z-index:5;
}

/* LOGO */
#logo{
    width:160px;
    height:160px;
    margin:30px auto;
    border-radius:50%;
    background:url("images/Senselessfish.png") center/cover;
    border:5px solid white;
    box-shadow:0 0 20px white;
    cursor:pointer;
    transition:.2s;
    position:relative;
    z-index:10;
}

#logo:hover{
    box-shadow:0 0 35px #00eaff;
    transform:scale(1.05);
}

/* BUTTON */
.btn{
    padding:14px 30px;
    border:none;
    border-radius:8px;
    background:#1464A0;
    color:white;
    cursor:pointer;
    transition:.2s;
    text-decoration:none;
    display:inline-block;
}

.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 15px #00eaff;
}

/* BUTTON BAR */
.top-btn-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
    position:relative;
    z-index:10;
}

/* TOP */
.top-wrapper{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:40px;
    margin-top:30px;
    position:relative;
    z-index:1;
}

.top-card{
    background:linear-gradient(180deg,#0c2236,#091a2b);
    border-radius:22px;
    padding:26px 24px 30px;
    width:250px;
    box-shadow:0 20px 40px rgba(0,0,0,.55);
    cursor:pointer;
    transition:.3s;
}

.top-card:hover{
    transform:translateY(-10px) scale(1.04);
}

/* TOP 1 */
.top-1{
    width:300px;
    transform:translateY(-30px);
    background:linear-gradient(180deg,#3a2c00,#1b1400);
}

/* AVATAR */
.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:auto;
    background:#222;
}

/* GLOW */
@keyframes glowPulse{
    0%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
    50%{box-shadow:0 0 25px var(--c),0 0 50px var(--c)}
    100%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
}

.avatar.gold{--c:gold;border:5px solid gold;animation:glowPulse 2.5s infinite}
.avatar.silver{--c:silver;border:5px solid silver;animation:glowPulse 2.8s infinite}
.avatar.bronze{--c:#cd7f32;border:5px solid #cd7f32;animation:glowPulse 3s infinite}

/* CROWN */
.crown{
    position:absolute;
    top:-22px;              /* hạ xuống nhẹ */
    left:50%;
    transform:translateX(-50%);
    font-size:32px;
    z-index:20;
    filter: drop-shadow(0 4px 6px rgba(0,0,0,.6));
    pointer-events:none;
}

/* RANK */
.rank{
    width:36px;
    height:36px;
    border-radius:50%;
    margin:8px auto 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:black;
}

.gold{background:gold}
.silver{background:silver}
.bronze{background:#cd7f32}

.name{font-size:18px;font-weight:bold}
.stage{font-size:14px;color:#ffd966}

/* LIST */
.rank-list{
    width:100%;
    max-width:900px;
    margin:40px auto;
}

.rank-row{
    display:flex;
    align-items:center;
    width:100%;
    gap:14px;
    padding:12px 18px;
    background:rgba(0,0,0,.45);
    border-radius:12px;
    margin-bottom:8px;
}

/* DISCORD */
#discordJoin{
    position:fixed;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    width:42px;
    height:42px;
    background:#5865F2;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    z-index:10;
}
.view-profile{
    margin-top:10px;
    padding:6px 14px;
    font-size:13px;
    border-radius:6px;
    background:#1e90ff;
    color:white;
    border:none;
    cursor:pointer;
    transition:.2s;
}

.view-profile:hover{
    background:#00eaff;
    box-shadow:0 0 10px #00eaff;
    transform:scale(1.05);
}
.rank-list,
.rank-row{
    text-align:left;
}
/* ===== SHINY EFFECT ===== */
/* ===== SHINE VERTICAL ===== */
@keyframes shineVertical {
    0% {
        top: -120%;
        opacity: 0;
    }
    20% {
        opacity: .4;
    }
    50% {
        top: 120%;
        opacity: .25;
    }
    80% {
        opacity: .4;
    }
    100% {
        top: -120%;
        opacity: 0;
    }
}

.top-card::after{
    content:"";
    position:absolute;
    left:0;
    top:-120%;
    width:100%;
    height:120%;
    background:linear-gradient(
        to bottom,
        transparent,
        rgba(255,255,255,.35),
        transparent
    );
    animation:shineVertical 4s ease-in-out infinite;
    pointer-events:none;
}

.top-card::after{
    content:"";
    position:absolute;
    top:0;
    left:-60%;
    width:60%;
    height:100%;
    background:linear-gradient(
        120deg,
        transparent,
        rgba(255,255,255,.25),
        transparent
    );
    transform:skewX(-20deg);
    animation:shineMove 4s infinite;
}

/* ===== TOP 1 STYLE ===== */
.top-1{
    background:linear-gradient(135deg,#3a2c00,#ffd700,#3a2c00);
    box-shadow:
        0 0 25px gold,
        0 0 80px rgba(255,215,0,.7);
    border:2px solid gold;
}

/* ===== TOP 2 STYLE ===== */
.top-2{
    background:linear-gradient(135deg,#1c1c1c,#cfd2d6,#1c1c1c);
    box-shadow:
        0 0 20px silver,
        0 0 45px rgba(220,220,220,.6);
    border:2px solid silver;
}

/* ===== TOP 3 STYLE ===== */
.top-3{
    background:linear-gradient(135deg,#2a1600,#cd7f32,#2a1600);
    box-shadow:
        0 0 18px #cd7f32,
        0 0 40px rgba(205,127,50,.6);
    border:2px solid #cd7f32;
}

/* smooth hover */
.top-card{
    position:relative;
    overflow:hidden;
}
.top-card::after{
    content:"";
    position:absolute;
    left:0;
    top:-120%;
    width:100%;
    height:120%;
    background:linear-gradient(
        to bottom,
        transparent,
        rgba(255,255,255,.35),
        transparent
    );
    animation:shineVertical 4s ease-in-out infinite;
    pointer-events:none;
}
@keyframes shineVertical{
    0%{top:-120%;opacity:0}
    20%{opacity:.4}
    50%{top:120%;opacity:.25}
    80%{opacity:.4}
    100%{top:-120%;opacity:0}
}
.top-card.top-1{
    overflow: visible;
}
</style>
</head>
