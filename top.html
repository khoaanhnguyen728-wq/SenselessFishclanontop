<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Senseless Fish</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0B3C5D,#328CC1,#0B3C5D);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    text-align:center;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* BRAND */
#brand{
    position:fixed;
    top:16px;
    right:22px;
    font-size:38px;
    font-weight:900;
    background:linear-gradient(135deg,#00eaff,#1e90ff,#9d4edd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(0,234,255,.9);
    animation:brandFloat 3s ease-in-out infinite;
    pointer-events:none;
    z-index:5;
}

@keyframes brandFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
    100%{transform:translateY(0)}
}

/* STATS */
#statsBox{
    position:fixed;
    top:15px;
    left:15px;
    background:rgba(0,0,0,.6);
    padding:10px 15px;
    border-radius:10px;
    z-index:5;
}

/* LOGO */
#logo{
    width:160px;
    height:160px;
    margin:30px auto;
    border-radius:50%;
    background:url("images/Senselessfish.png") center/cover;
    border:5px solid white;
    box-shadow:0 0 20px white;
    cursor:pointer;
    transition:.2s;
    position:relative;
    z-index:10;
}

#logo:hover{
    box-shadow:0 0 35px #00eaff;
    transform:scale(1.05);
}

/* BUTTON */
.btn{
    padding:14px 30px;
    border:none;
    border-radius:8px;
    background:#1464A0;
    color:white;
    cursor:pointer;
    transition:.2s;
    text-decoration:none;
    display:inline-block;
}

.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 15px #00eaff;
}

/* BUTTON BAR */
.top-btn-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
    position:relative;
    z-index:10;
}

/* TOP */
.top-wrapper{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:40px;
    margin-top:30px;
    position:relative;
    z-index:1;
}

.top-card{
    background:linear-gradient(180deg,#0c2236,#091a2b);
    border-radius:22px;
    padding:26px 24px 30px;
    width:250px;
    box-shadow:0 20px 40px rgba(0,0,0,.55);
    cursor:pointer;
    transition:.3s;
}

.top-card:hover{
    transform:translateY(-10px) scale(1.04);
}

/* TOP 1 */
.top-1{
    width:300px;
    transform:translateY(-30px);
    background:linear-gradient(180deg,#3a2c00,#1b1400);
}

/* AVATAR */
.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:auto;
    background:#222;
    background-size:cover;
    background-position:center;
}

/* GLOW */
@keyframes glowPulse{
    0%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
    50%{box-shadow:0 0 25px var(--c),0 0 50px var(--c)}
    100%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
}

.avatar.gold{--c:gold;border:5px solid gold;animation:glowPulse 2.5s infinite}
.avatar.silver{--c:silver;border:5px solid silver;animation:glowPulse 2.8s infinite}
.avatar.bronze{--c:#cd7f32;border:5px solid #cd7f32;animation:glowPulse 3s infinite}

/* CROWN */
.crown-wrap{
    position:absolute;
    top:-32px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    z-index:50;
    pointer-events:none;
}
.top-1{
    position: relative;
    overflow: visible;
}

.crown{
    position: absolute;
    top: -55px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 38px;
    z-index: 999;
    pointer-events: none;

    animation:
        crownFloat 2.5s ease-in-out infinite,
        crownGlow 1.8s ease-in-out infinite;
}
@keyframes crownFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-5px)}
    100%{transform:translateY(0)}
}

/* RANK */
.rank{
    width:36px;
    height:36px;
    border-radius:50%;
    margin:8px auto 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:black;
}

.gold{background:gold}
.silver{background:silver}
.bronze{background:#cd7f32}

.name{font-size:18px;font-weight:bold}
.stage{font-size:14px;color:#ffd966}

/* LIST */
.rank-list{
    width:100%;
    max-width:900px;
    margin:40px auto;
}

.rank-row{
    display:flex;
    align-items:center;
    width:100%;
    gap:14px;
    padding:12px 18px;
    background:rgba(0,0,0,.45);
    border-radius:12px;
    margin-bottom:8px;
}

/* ===== DISCORD FLOAT BUTTON ===== */
#discordJoin{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    width:52px;
    height:52px;

    background:#5865F2;
    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
    cursor:pointer;
    z-index:20;

    box-shadow:
        0 8px 20px rgba(88,101,242,.6),
        0 0 18px rgba(88,101,242,.8);

    animation:
        discordFloat 2.6s ease-in-out infinite,
        discordGlow 1.8s ease-in-out infinite;

    transition:.25s;
}

/* Hover (PC) */
#discordJoin:hover{
    transform:translateX(-50%) scale(1.12);
    box-shadow:
        0 12px 28px rgba(88,101,242,.9),
        0 0 30px rgba(88,101,242,1);
}

/* ===== FLOAT UP DOWN ===== */
@keyframes discordFloat{
    0%   { transform:translateX(-50%) translateY(0); }
    50%  { transform:translateX(-50%) translateY(-10px); }
    100% { transform:translateX(-50%) translateY(0); }
}

/* ===== GLOW PULSE ===== */
@keyframes discordGlow{
    0%{
        box-shadow:
            0 6px 18px rgba(88,101,242,.6),
            0 0 12px rgba(88,101,242,.7);
    }
    50%{
        box-shadow:
            0 12px 30px rgba(88,101,242,.9),
            0 0 28px rgba(88,101,242,1);
    }
    100%{
        box-shadow:
            0 6px 18px rgba(88,101,242,.6),
            0 0 12px rgba(88,101,242,.7);
    }
}
.view-profile{
    margin-top:10px;
    padding:6px 14px;
    font-size:13px;
    border-radius:6px;

    background:#ffffff;          /* nền trắng */
    color:#1e90ff;               /* chữ xanh */
    border:1.5px solid #1e90ff;

    cursor:pointer;
    transition:.2s;
    font-weight:600;
}

.view-profile:hover{
    background:#f2faff;          /* trắng xanh nhẹ */
    box-shadow:0 0 12px #00eaff;
    transform:scale(1.05);
}
.rank-list,
.rank-row{
    text-align:left;
}
/* ===== SHINY EFFECT ===== */
/* ===== SHINE VERTICAL ===== */
@keyframes shineDiagonal {
    0% {
        left: -120%;
        top: -120%;
        opacity: 0;
    }
    30% {
        opacity: .4;
    }
    50% {
        left: 120%;
        top: 120%;
        opacity: .25;
    }
    80% {
        opacity: .4;
    }
    100% {
        left: -120%;
        top: -120%;
        opacity: 0;
    }
}

.top-card::after{
    content:"";
    position:absolute;
    top:-120%;
    left:-120%;
    width:200%;
    height:200%;

    background:linear-gradient(
        135deg,
        transparent 40%,
        rgba(255,255,255,.35) 50%,
        transparent 60%
    );

    animation: shineDiagonal 4.5s ease-in-out infinite;
    pointer-events:none;
}
.top-card{
    position:relative;
    overflow:hidden;      /* khóa ánh sáng */
    border-radius:22px;
}
/* ===== TOP 1 STYLE ===== */
.top-1{
    background:linear-gradient(135deg,#3a2c00,#ffd700,#3a2c00);
    box-shadow:
        0 0 25px gold,
        0 0 80px rgba(255,215,0,.7);
    border:2px solid gold;
}

/* ===== TOP 2 STYLE ===== */
.top-2{
    background:linear-gradient(135deg,#1c1c1c,#cfd2d6,#1c1c1c);
    box-shadow:
        0 0 20px silver,
        0 0 45px rgba(220,220,220,.6);
    border:2px solid silver;
}

/* ===== TOP 3 STYLE ===== */
.top-3{
    background:linear-gradient(135deg,#2a1600,#cd7f32,#2a1600);
    box-shadow:
        0 0 18px #cd7f32,
        0 0 40px rgba(205,127,50,.6);
    border:2px solid #cd7f32;

}
@keyframes shineVertical{
    0%{top:-120%;opacity:0}
    20%{opacity:.4}
    50%{top:120%;opacity:.25}
    80%{opacity:.4}
    100%{top:-120%;opacity:0}

}
@keyframes crown{
    0%{transform:translateX(-50%) translateY(0)}
    50%{transform:translateX(-50%) translateY(-4px)}
    100%{transform:translateX(-50%) translateY(0)}
}

.top-1 .crown{
    animation:crownFloat 2.5s ease-in-out infinite;;
}
.avatar-wrap{
    position:relative;
    width:110px;
    margin:0 auto;
}
.top-slot{
    position:relative;
    width:260px;          /* đúng bằng card */
    margin:0 auto;
}
#floating-crown{
    position:fixed;              /* QUAN TRỌNG */
    font-size:36px;
    z-index:9999;
    pointer-events:none;

    animation:crownFloat 2.5s ease-in-out infinite;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.6));
    text-shadow:
        0 0 12px gold,
        0 0 28px rgba(255,215,0,.9);
}

@keyframes crown{
    0%{transform:translate(-50%,0)}
    50%{transform:translate(-50%,-6px)}
    100%{transform:translate(-50%,0)}
}
@keyframes crownFloat {
    0% {
        transform: translateX(-50%) translateY(0);
    }
    50% {
        transform: translateX(-50%) translateY(-8px);
    }
    100% {
        transform: translateX(-50%) translateY(0);
    }
}

.crown{
    position: absolute;
    top: -55px;
    left: 50%;
    font-size: 38px;
    z-index: 999;
    pointer-events: none;

    animation: crownFloat 2.5s ease-in-out infinite;

    text-shadow:
        0 0 10px gold,
        0 0 25px rgba(255,215,0,.9);
}
@keyframes crownGlow {
    0% {
        filter: drop-shadow(0 0 6px gold);
    }
    50% {
        filter: drop-shadow(0 0 16px gold);
    }
    100% {
        filter: drop-shadow(0 0 6px gold);
    }
}
/* ===== MOBILE OPTIMIZATION ===== */
@media (max-width: 768px){

  body{
    font-size:14px;
  }

  /* BRAND nhỏ lại */
  #brand{
    font-size:24px;
    top:10px;
    right:12px;
  }

  /* STATS gọn */
  #statsBox{
    font-size:12px;
    padding:8px 10px;
  }

  /* LOGO nhỏ */
  #logo{
    width:120px;
    height:120px;
    margin:20px auto;
  }

  /* BUTTON BAR xuống dòng */
  .top-btn-bar{
    flex-wrap:wrap;
    gap:10px;
  }
  .btn{
    padding:10px 18px;
    font-size:13px;
  }

  /* ===== TOP 1–2–3 STACK ===== */
  .top-wrapper{
    flex-direction:column;
    align-items:center;
    gap:22px;
  }

  .top-card{
    width:90%;
    max-width:320px;
  }

  /* TOP 1 nổi bật */
  .top-1{
    transform:none;
    order:-1;
  }

  .crown{
    top:-45px;
    font-size:32px;
  }

  /* AVATAR nhỏ lại */
  .avatar{
    width:90px;
    height:90px;
  }

  /* VIEW PROFILE dễ bấm */
  .view-profile{
    width:100%;
    margin-top:12px;
    padding:10px;
    font-size:14px;
  }

  /* ===== RANK LIST ===== */
  .rank-row{
    padding:14px;
    font-size:13px;
  }
}
@media (max-width: 768px){
  .top-card::after{
    animation:none; /* tắt shine nặng */
  }
}
@media (max-width:768px){
  #discordJoin{
    width:56px;
    height:56px;
    font-size:24px;
    bottom:18px;
  }
}
.register-box {
  width: 260px;
  background: rgba(0,0,0,0.35);
  padding: 15px;
  border-radius: 15px;
  color: white;
}

.register-box input {
  width: 100%;
  margin-bottom: 10px;
  padding: 8px;
  border-radius: 8px;
  border: none;
}

.register-box button {
  width: 100%;
  padding: 10px;
  border: none;
  border-radius: 10px;
  background: #5865F2;
  color: white;
  font-weight: bold;
  cursor: pointer;
}

.register-box button:hover {
  background: #404EED;
}
@media (max-width: 768px) {
  .register-box {
    position: static;
    margin: 20px auto;
  }
}
/* ===== NAVBAR GRADIENT ===== */
.navbar{
  position: fixed;
  top: 0;

  /* xích sang trái nhẹ */
  left: 50%;
  transform: translateX(calc(-50% - 60px));

  width: 95%;
  max-width: 1200px;
  height: 64px;

  /* GRADIENT */
  background: linear-gradient(
    135deg,
    rgba(10,20,40,.95),
    rgba(30,60,120,.9),
    rgba(10,20,40,.95)
  );

  backdrop-filter: blur(10px);
  border-radius: 20px;
  padding: 0 22px;

  display: flex;
  align-items: center;
  justify-content: space-between;

  z-index: 9999;

  box-shadow:
    0 10px 30px rgba(0,0,0,.6),
    0 0 25px rgba(30,144,255,.4);
}

/* tránh che nội dung */
.nav-space{
  height: 92px;
}
/* LOGO */
.nav-logo{
  height:42px;
  cursor:pointer;
  transition:.25s;
}
.nav-logo:hover{
  transform:scale(1.08);
  filter:drop-shadow(0 0 10px #00eaff);
}

/* MENU */
.nav-center{
  display:flex;
  gap:22px;
}

.nav-item{
  color:#ddd;
  text-decoration:none;
  font-size:15px;
  font-weight:600;

  display:flex;
  align-items:center;
  gap:6px;

  padding:8px 14px;
  border-radius:12px;
  transition:.25s;
}

.nav-item:hover{
  background:rgb(26, 82, 204);
  color:#00eaff;
  box-shadow:0 0 12px rgba(0,234,255,.6);
  transform:translateY(-2px);
}

/* ===== MOBILE ===== */
@media (max-width:768px){
  .navbar{
    height:auto;
    padding:12px;
  }
  .nav-center{
    flex-wrap:wrap;
    justify-content:center;
    gap:10px;
  }
  .nav-item{
    font-size:13px;
    padding:6px 10px;
  }
}
.navbar::before{
  content:"";
  position:absolute;
  inset:0;
  border-radius:20px;
  padding:1px;
  background:linear-gradient(135deg,#00eaff,#1e90ff,#9d4edd);
  -webkit-mask:
    linear-gradient(#000 0 0) content-box,
    linear-gradient(#000 0 0);
  -webkit-mask-composite:xor;
          mask-composite:exclude;
  pointer-events:none;
}
/* ========================= */
/* ===== FISH BACKGROUND === */
/* ========================= */
.fish-layer{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
}

.fish{
    position:absolute;
    width:80px;
    height:28px;
    background:rgba(0,0,0,.35);
    border-radius:50%;
    filter:blur(7px);
    opacity:.45;
}

.fish::after{
    content:"";
    position:absolute;
    top:4px;
    width:0;
    height:0;
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
}

/* trái → phải */
.swim-right{
    animation:
        swimRight 30s linear infinite,
        fishFloat 6s ease-in-out infinite;
}
.swim-right::after{
    left:-16px;
    border-right:16px solid rgba(0,0,0,.35);
}
@keyframes swimRight{
    from{transform:translateX(-140px);}
    to{transform:translateX(calc(100vw + 140px));}
}

/* phải → trái */
.swim-left{
    animation:
        swimLeft 34s linear infinite,
        fishFloat 7s ease-in-out infinite;
}
.swim-left::after{
    right:-16px;
    border-left:16px solid rgba(0,0,0,.35);
}
@keyframes swimLeft{
    from{transform:translateX(calc(100vw + 140px));}
    to{transform:translateX(-140px);}
}

/* lượn lên xuống */
@keyframes fishFloat{
    0%{translate:0 0}
    50%{translate:0 -12px}
    100%{translate:0 0}
}
/* ===== FLOATING GIF BUTTON ===== */
.gif-float{
    position:fixed;
    bottom:20px;
    right:20px;
    width:70px;          /* chỉnh size */
    height:70px;
    z-index:9999;
    cursor:pointer;
    transition:.25s;
}

.gif-float img{
    width:100%;
    height:100%;
    object-fit:contain;
    border-radius:14px;
    box-shadow:
        0 8px 20px rgba(0,0,0,.6),
        0 0 20px rgba(0,200,255,.6);
}

/* hover */
.gif-float:hover{
    transform:scale(1.12);
}

/* hiệu ứng lượn nhẹ (optional) */
.gif-float{
    animation: gifFloat 3s ease-in-out infinite;
}

@keyframes gifFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-8px)}
    100%{transform:translateY(0)}
}
/* ===== REGISTER LEFT - RIGHT ===== */
.register-wrapper{
  position: fixed;

  z-index: 9998;

}

/* ===== DOLPHINS ===== */
#dolphin-layer{
  position:fixed;
  inset:0;
  pointer-events:none;
  overflow:hidden;

}

.dolphin{

/* ===== TOOLS DROPDOWN ===== */

}

.tools-btn{

}

.tools-btn:hover{

}

/* dropdown box */
.tools-dropdown{
  position:absolute;

}

/* item */
.tools-dropdown a{
  text-decoration:none;
  color:#e5e7eb;

  font-size:14px;

.tools-dropdown a:hover{

  box-shadow:0 0 12px #00eaff;
}

/* hover mở */
.nav-tools:hover .tools-dropdown{

}
/* ===== ARROW ===== */
.tools-btn .arrow{
  font-size:12px;
  margin-left:4px;
  transition:.25s;
  opacity:.8;
}

/* khi hover (menu mở) → mũi tên xuống */
.nav-tools:hover .tools-btn .arrow{
  transform:rotate(180deg); /* ▲ → ▼ */

<script>

const CLIENT_ID = "1476208651835408506";
const REDIRECT_URI = window.location.origin + window.location.pathname;

let discordUser = null;

/* ===== LOGIN ===== */

function loginDiscord(){

const url =
"https://discord.com/oauth2/authorize"
+ "?client_id="+CLIENT_ID
+ "&response_type=token"
+ "&redirect_uri="+encodeURIComponent(REDIRECT_URI)
+ "&scope=identify";

window.location.href=url;

}


/* ===== LOAD USER ===== */

function loadUser(){

let token = null

/* 1. lấy token từ URL */
const hash = window.location.hash

if(hash){
token = new URLSearchParams(hash.substring(1)).get("access_token")

if(token){
localStorage.setItem("discord_token", token)
window.location.hash = ""   // xoá token khỏi URL
}
}

/* 2. nếu không có hash thì lấy từ localStorage */
if(!token){
token = localStorage.getItem("discord_token")
}

if(!token) return

/* 3. lấy thông tin user */

fetch("https://discord.com/api/users/@me",{
headers:{
authorization:"Bearer "+token
}
})
.then(res=>res.json())
.then(user=>{

discordUser=user

document.getElementById("loginStatus").innerHTML="🟢 Đã đăng nhập"
document.getElementById("registerStatus").innerHTML="🟢 Đã đăng nhập"

document.getElementById("loginBox").style.display="none"
document.getElementById("userBox").style.display="block"

document.getElementById("userName").innerText=user.username

document.getElementById("userAvatar").src=
"https://cdn.discordapp.com/avatars/"
+user.id+"/"+user.avatar+".png"

})

}

loadUser()
function logoutDiscord(){
localStorage.removeItem("discord_token")
location.reload()
}

<script>
let player;
let started = false;
let isMuted = false;

function onYouTubeIframeAPIReady(){
  player = new YT.Player('yt-player',{
    height:'0',
    width:'0',
    videoId:'G-9EEDWvg9E',
    playerVars:{
      autoplay:0,
      loop:1,
      playlist:'G-9EEDWvg9E',
      controls:0
    },
    events:{
      onReady:()=>{
        player.setVolume(100);
      }
    }
  });
}

/* click lần đầu để phát nhạc */
document.addEventListener("click",()=>{
  if(started || !player) return;
  player.playVideo();
  started = true;
});

/* icon loa */
soundToggle.onclick = ()=>{
  if(!player) return;

  if(!started){
    player.playVideo();
    started = true;
  }

  isMuted = !isMuted;

  if(isMuted){
    player.mute();
    volumeSlider.value = 0;
    soundToggle.textContent = "🔇";
    soundToggle.classList.add("muted");
  }else{
    player.unMute();
    player.setVolume(100);
    volumeSlider.value = 100;
    soundToggle.textContent = "🔊";
    soundToggle.classList.remove("muted");
  }
};

/* slider âm lượng */
volumeSlider.addEventListener("input",()=>{
  if(!player) return;

  const v = volumeSlider.value;
  player.setVolume(v);

  if(v == 0){
    player.mute();
    soundToggle.textContent = "🔇";
    soundToggle.classList.add("muted");
    isMuted = true;
  }else{
    player.unMute();
    soundToggle.textContent = "🔊";
    soundToggle.classList.remove("muted");
    isMuted = false;
  }
});
</script>
<script>
const dolphinLayer = document.getElementById("dolphin-layer");
const dolphinIcon = "🐬";

/* tạo 1 con cá heo */
function spawnDolphin(){
  const d = document.createElement("div");
  d.className = "dolphin";
  d.textContent = dolphinIcon;

  /* random vị trí ngang */
  const x = Math.random() * 100;
  d.style.left = x + "vw";

  /* random size (chiều sâu) */
  const size = Math.random() * 24 + 12; // 12px → 36px
  d.style.fontSize = size + "px";

  /* càng nhỏ càng tối */
  const darkness = Math.max(0.35, size / 36);
  d.style.opacity = darkness;

  /* random thời gian rơi */
  const duration = Math.random() * 6 + 6; // 6s → 12s
  d.style.animationDuration = duration + "s";

  dolphinLayer.appendChild(d);

  /* xóa sau khi rơi xong */
  setTimeout(()=>{
    d.remove();
  }, duration * 1000);
}

/* rơi ít thôi */
setInterval(spawnDolphin,500);
