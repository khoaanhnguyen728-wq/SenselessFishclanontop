<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Senseless Fish</title>
<script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0B3C5D,#328CC1,#0B3C5D);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    text-align:center;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* BRAND */
#brand{
    position:fixed;
    top:16px;
    right:22px;
    font-size:38px;
    font-weight:900;
    background:linear-gradient(135deg,#00eaff,#1e90ff,#9d4edd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(0,234,255,.9);
    animation:brandFloat 3s ease-in-out infinite;
}
@keyframes brandFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
    100%{transform:translateY(0)}
}

/* STATS */
#statsBox{
    position:fixed;
    top:15px;
    left:15px;
    background:rgba(0,0,0,.6);
    padding:10px 15px;
    border-radius:10px;
}

/* LOGO */
#logo{
    width:160px;
    height:160px;
    margin:30px auto;
    border-radius:50%;
    background:url("images/Senselessfish.png") center/cover;
    border:5px solid white;
    box-shadow:0 0 20px white;
    cursor:pointer;
    transition:.2s;
}
#logo:hover{
    box-shadow:0 0 35px #00eaff;
    transform:scale(1.05);
}

/* BUTTON */
.btn{
    padding:14px 30px;
    margin:10px;
    border:none;
    border-radius:8px;
    background:#1464A0;
    color:white;
    cursor:pointer;
    transition:.2s;
}
.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 15px #00eaff;
}

/* BUTTON BAR */
.top-btn-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
}

/* TOP */
.top-wrapper{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:40px;
    margin-top:30px;
}

.top-card{
    background:linear-gradient(180deg,#0c2236,#091a2b);
    border-radius:22px;
    padding:26px 24px 30px;
    width:250px;
    box-shadow:0 20px 40px rgba(0,0,0,.55);
    position:relative;
    cursor:pointer;
    transition:.3s;
}
.top-card:hover{
    transform:translateY(-10px) scale(1.04);
}

/* TOP 1 */
.top-1{
    width:300px;
    transform:translateY(-30px);
    background:linear-gradient(180deg,#3a2c00,#1b1400);
}

/* AVATAR */
.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:auto;
    background-size:cover;
    background-position:center;
}

/* GLOW */
@keyframes glowPulse{
    0%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
    50%{box-shadow:0 0 25px var(--c),0 0 50px var(--c)}
    100%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
}

.avatar.gold{--c:gold;border:5px solid gold;animation:glowPulse 2.5s infinite}
.avatar.silver{--c:silver;border:5px solid silver;animation:glowPulse 2.8s infinite}
.avatar.bronze{--c:#cd7f32;border:5px solid #cd7f32;animation:glowPulse 3s infinite}

/* CROWN */
.crown{
    position:absolute;
    top:-28px;
    left:50%;
    transform:translateX(-50%);
    font-size:34px;
}

/* RANK NUMBER */
.rank{
    width:36px;
    height:36px;
    border-radius:50%;
    margin:8px auto 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:black;
}
.gold{background:gold}
.silver{background:silver}
.bronze{background:#cd7f32}

.name{font-size:18px;font-weight:bold}
.stage{font-size:14px;color:#ffd966}

/* LIST */
.rank-list{
    width:70%;
    margin:40px auto;
}
.rank-row{
    display:flex;
    justify-content:space-between;
    padding:12px 18px;
    background:rgba(0,0,0,.45);
    border-radius:12px;
    margin-bottom:8px;
}

/* DISCORD */
#discordJoin{
    position:fixed;
    bottom:12px;
    left:50%;
    transform:translateX(-50%);
    width:42px;
    height:42px;
    background:#5865F2;
    border-radius:12px;
    display:flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
}
#discordJoin img{
    width:22px;
    height:22px;
}
</style>
</head>

<body>

<div id="brand">SenselessFish</div>

<div id="statsBox">
    👥 Total: <span id="totalMembers">0</span><br>
    🟢 Online: <span id="onlineMembers">0</span>
</div>

<!-- LOGO (CLICK TO HOME) -->
<div id="logo" onclick="goHome()"></div>

<div class="top-btn-bar">
    <button class="btn" onclick="alert('Trang Staff Clan')">Staff Clan</button>
    <button class="btn" onclick="showTop()">Top Clan</button>
    <button class="btn" onclick="alert('Trang Giới Thiệu')">Giới thiệu Clan</button>
</div>

<div id="contentBox"></div>

<div id="discordJoin" onclick="window.open('https://discord.gg/yourlink')">
    <img src="images/discord-icon.png">
</div>

<script>
function goHome(){
    location.href = "trangchu.html";
}

function showTop(){
document.getElementById("contentBox").innerHTML = `
<h2>🏆 Top Clan</h2>

<div class="top-wrapper">

<div class="top-card">
<div class="avatar silver"></div>
<div class="rank silver">2</div>
<div class="name">Top Two</div>
<div class="stage">Member</div>
</div>

<div class="top-card top-1">
<div class="crown">👑</div>
<div class="avatar gold"></div>
<div class="rank gold">1</div>
<div class="name">Top One</div>
<div class="stage">Leader</div>
</div>

<div class="top-card">
<div class="avatar bronze"></div>
<div class="rank bronze">3</div>
<div class="name">Top Three</div>
<div class="stage">Member</div>
</div>

</div>

<div class="rank-list">
${Array.from({length:10},(_,i)=>`
<div class="rank-row">
<span>#${i+4}</span>
<span>Member ${i+4}</span>
<span>Stage 1</span>
</div>
`).join("")}
</div>
`;
}

showTop();
</script>

</body>
</html>
