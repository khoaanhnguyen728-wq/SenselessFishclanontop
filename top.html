<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Senseless Fish</title>

<style>
*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0B3C5D,#328CC1,#0B3C5D);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
    text-align:center;
}

@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* BRAND */
#brand{
    position:fixed;
    top:16px;
    right:22px;
    font-size:38px;
    font-weight:900;
    background:linear-gradient(135deg,#00eaff,#1e90ff,#9d4edd);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    text-shadow:0 0 20px rgba(0,234,255,.9);
    animation:brandFloat 3s ease-in-out infinite;
    pointer-events:none;
    z-index:5;
}

@keyframes brandFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-6px)}
    100%{transform:translateY(0)}
}

/* STATS */
#statsBox{
    position:fixed;
    top:15px;
    left:15px;
    background:rgba(0,0,0,.6);
    padding:10px 15px;
    border-radius:10px;
    z-index:5;
}

/* LOGO */
#logo{
    width:160px;
    height:160px;
    margin:30px auto;
    border-radius:50%;
    background:url("images/Senselessfish.png") center/cover;
    border:5px solid white;
    box-shadow:0 0 20px white;
    cursor:pointer;
    transition:.2s;
    position:relative;
    z-index:10;
}

#logo:hover{
    box-shadow:0 0 35px #00eaff;
    transform:scale(1.05);
}

/* BUTTON */
.btn{
    padding:14px 30px;
    border:none;
    border-radius:8px;
    background:#1464A0;
    color:white;
    cursor:pointer;
    transition:.2s;
    text-decoration:none;
    display:inline-block;
}

.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 15px #00eaff;
}

/* BUTTON BAR */
.top-btn-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-bottom:20px;
    position:relative;
    z-index:10;
}

/* TOP */
.top-wrapper{
    display:flex;
    justify-content:center;
    align-items:flex-end;
    gap:40px;
    margin-top:30px;
    position:relative;
    z-index:1;
}

.top-card{
    background:linear-gradient(180deg,#0c2236,#091a2b);
    border-radius:22px;
    padding:26px 24px 30px;
    width:250px;
    box-shadow:0 20px 40px rgba(0,0,0,.55);
    cursor:pointer;
    transition:.3s;
}

.top-card:hover{
    transform:translateY(-10px) scale(1.04);
}

/* TOP 1 */
.top-1{
    width:300px;
    transform:translateY(-30px);
    background:linear-gradient(180deg,#3a2c00,#1b1400);
}

/* AVATAR */
.avatar{
    width:110px;
    height:110px;
    border-radius:50%;
    margin:auto;
    background:#222;
}

/* GLOW */
@keyframes glowPulse{
    0%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
    50%{box-shadow:0 0 25px var(--c),0 0 50px var(--c)}
    100%{box-shadow:0 0 12px var(--c),0 0 25px var(--c)}
}

.avatar.gold{--c:gold;border:5px solid gold;animation:glowPulse 2.5s infinite}
.avatar.silver{--c:silver;border:5px solid silver;animation:glowPulse 2.8s infinite}
.avatar.bronze{--c:#cd7f32;border:5px solid #cd7f32;animation:glowPulse 3s infinite}

/* CROWN */
.crown-wrap{
    position:absolute;
    top:-32px;
    left:50%;
    transform:translateX(-50%);
    width:0;
    height:0;
    z-index:50;
    pointer-events:none;
}
.top-1{
    position: relative;
    overflow: visible;
}

.crown{
    position: absolute;
    top: -55px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 38px;
    z-index: 999;
    pointer-events: none;

    animation:
        crownFloat 2.5s ease-in-out infinite,
        crownGlow 1.8s ease-in-out infinite;
}
@keyframes crownFloat{
    0%{transform:translateY(0)}
    50%{transform:translateY(-5px)}
    100%{transform:translateY(0)}
}

/* RANK */
.rank{
    width:36px;
    height:36px;
    border-radius:50%;
    margin:8px auto 10px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-weight:bold;
    color:black;
}

.gold{background:gold}
.silver{background:silver}
.bronze{background:#cd7f32}

.name{font-size:18px;font-weight:bold}
.stage{font-size:14px;color:#ffd966}

/* LIST */
.rank-list{
    width:100%;
    max-width:900px;
    margin:40px auto;
}

.rank-row{
    display:flex;
    align-items:center;
    width:100%;
    gap:14px;
    padding:12px 18px;
    background:rgba(0,0,0,.45);
    border-radius:12px;
    margin-bottom:8px;
}

/* ===== DISCORD FLOAT BUTTON ===== */
#discordJoin{
    position:fixed;
    bottom:14px;
    left:50%;
    transform:translateX(-50%);
    width:52px;
    height:52px;

    background:#5865F2;
    border-radius:14px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:22px;
    cursor:pointer;
    z-index:20;

    box-shadow:
        0 8px 20px rgba(88,101,242,.6),
        0 0 18px rgba(88,101,242,.8);

    animation:
        discordFloat 2.6s ease-in-out infinite,
        discordGlow 1.8s ease-in-out infinite;

    transition:.25s;
}

/* Hover (PC) */
#discordJoin:hover{
    transform:translateX(-50%) scale(1.12);
    box-shadow:
        0 12px 28px rgba(88,101,242,.9),
        0 0 30px rgba(88,101,242,1);
}

/* ===== FLOAT UP DOWN ===== */
@keyframes discordFloat{
    0%   { transform:translateX(-50%) translateY(0); }
    50%  { transform:translateX(-50%) translateY(-10px); }
    100% { transform:translateX(-50%) translateY(0); }
}

/* ===== GLOW PULSE ===== */
@keyframes discordGlow{
    0%{
        box-shadow:
            0 6px 18px rgba(88,101,242,.6),
            0 0 12px rgba(88,101,242,.7);
    }
    50%{
        box-shadow:
            0 12px 30px rgba(88,101,242,.9),
            0 0 28px rgba(88,101,242,1);
    }
    100%{
        box-shadow:
            0 6px 18px rgba(88,101,242,.6),
            0 0 12px rgba(88,101,242,.7);
    }
}
.view-profile{
    margin-top:10px;
    padding:6px 14px;
    font-size:13px;
    border-radius:6px;

    background:#ffffff;          /* nền trắng */
    color:#1e90ff;               /* chữ xanh */
    border:1.5px solid #1e90ff;

    cursor:pointer;
    transition:.2s;
    font-weight:600;
}

.view-profile:hover{
    background:#f2faff;          /* trắng xanh nhẹ */
    box-shadow:0 0 12px #00eaff;
    transform:scale(1.05);
}
.rank-list,
.rank-row{
    text-align:left;
}
/* ===== SHINY EFFECT ===== */
/* ===== SHINE VERTICAL ===== */
@keyframes shineDiagonal {
    0% {
        left: -120%;
        top: -120%;
        opacity: 0;
    }
    30% {
        opacity: .4;
    }
    50% {
        left: 120%;
        top: 120%;
        opacity: .25;
    }
    80% {
        opacity: .4;
    }
    100% {
        left: -120%;
        top: -120%;
        opacity: 0;
    }
}

.top-card::after{
    content:"";
    position:absolute;
    top:-120%;
    left:-120%;
    width:200%;
    height:200%;

    background:linear-gradient(
        135deg,
        transparent 40%,
        rgba(255,255,255,.35) 50%,
        transparent 60%
    );

    animation: shineDiagonal 4.5s ease-in-out infinite;
    pointer-events:none;
}
.top-card{
    position:relative;
    overflow:hidden;      /* khóa ánh sáng */
    border-radius:22px;
}
/* ===== TOP 1 STYLE ===== */
.top-1{
    background:linear-gradient(135deg,#3a2c00,#ffd700,#3a2c00);
    box-shadow:
        0 0 25px gold,
        0 0 80px rgba(255,215,0,.7);
    border:2px solid gold;
}

/* ===== TOP 2 STYLE ===== */
.top-2{
    background:linear-gradient(135deg,#1c1c1c,#cfd2d6,#1c1c1c);
    box-shadow:
        0 0 20px silver,
        0 0 45px rgba(220,220,220,.6);
    border:2px solid silver;
}

/* ===== TOP 3 STYLE ===== */
.top-3{
    background:linear-gradient(135deg,#2a1600,#cd7f32,#2a1600);
    box-shadow:
        0 0 18px #cd7f32,
        0 0 40px rgba(205,127,50,.6);
    border:2px solid #cd7f32;

}
@keyframes shineVertical{
    0%{top:-120%;opacity:0}
    20%{opacity:.4}
    50%{top:120%;opacity:.25}
    80%{opacity:.4}
    100%{top:-120%;opacity:0}

}
@keyframes crown{
    0%{transform:translateX(-50%) translateY(0)}
    50%{transform:translateX(-50%) translateY(-4px)}
    100%{transform:translateX(-50%) translateY(0)}
}

.top-1 .crown{
    animation:crownFloat 2.5s ease-in-out infinite;;
}
.avatar-wrap{
    position:relative;
    width:110px;
    margin:0 auto;
}
.top-slot{
    position:relative;
    width:260px;          /* đúng bằng card */
    margin:0 auto;
}
#floating-crown{
    position:fixed;              /* QUAN TRỌNG */
    font-size:36px;
    z-index:9999;
    pointer-events:none;

    animation:crownFloat 2.5s ease-in-out infinite;
    filter:drop-shadow(0 4px 6px rgba(0,0,0,.6));
    text-shadow:
        0 0 12px gold,
        0 0 28px rgba(255,215,0,.9);
}

@keyframes crown{
    0%{transform:translate(-50%,0)}
    50%{transform:translate(-50%,-6px)}
    100%{transform:translate(-50%,0)}
}
@keyframes crownFloat {
    0% {
        transform: translateX(-50%) translateY(0);
    }
    50% {
        transform: translateX(-50%) translateY(-8px);
    }
    100% {
        transform: translateX(-50%) translateY(0);
    }
}

.crown{
    position: absolute;
    top: -55px;
    left: 50%;
    font-size: 38px;
    z-index: 999;
    pointer-events: none;

    animation: crownFloat 2.5s ease-in-out infinite;

    text-shadow:
        0 0 10px gold,
        0 0 25px rgba(255,215,0,.9);
}
@keyframes crownGlow {
    0% {
        filter: drop-shadow(0 0 6px gold);
    }
    50% {
        filter: drop-shadow(0 0 16px gold);
    }
    100% {
        filter: drop-shadow(0 0 6px gold);
    }
}
/* ===== MOBILE OPTIMIZATION ===== */
@media (max-width: 768px){

  body{

  }

}

  inset:0;

  -webkit-mask-composite:xor;
          mask-composite:exclude;
  pointer-events:none;
}
/* ========================= */
/* ===== FISH BACKGROUND === */
/* ========================= */
.fish-layer{
    position:fixed;
    inset:0;
    z-index:0;
    pointer-events:none;
    overflow:hidden;
}

.fish{
    position:absolute;
    width:80px;
    height:28px;
    background:rgba(0,0,0,.35);
    border-radius:50%;
    filter:blur(7px);
    opacity:.45;
}

.fish::after{
    content:"";
    position:absolute;
    top:4px;
    width:0;
    height:0;
    border-top:10px solid transparent;
    border-bottom:10px solid transparent;
}

/* trái → phải */
.swim-right{
    animation:
        swimRight 30s linear infinite,
        fishFloat 6s ease-in-out infinite;
}
.swim-right::after{
    left:-16px;
    border-right:16px solid rgba(0,0,0,.35);
}
@keyframes swimRight{
    from{transform:translateX(-140px);}
    to{transform:translateX(calc(100vw + 140px));}
}

/* phải → trái */
.swim-left{
    animation:
        swimLeft 34s linear infinite,
        fishFloat 7s ease-in-out infinite;
}
.swim-left::after{
    right:-16px;
    border-left:16px solid rgba(0,0,0,.35);
}
@keyframes swimLeft{
    from{transform:translateX(calc(100vw + 140px));}
    to{transform:translateX(-140px);}
}

/* lượn lên xuống */
@keyframes fishFloat{
    0%{translate:0 0}
    50%{translate:0 -12px}
    100%{translate:0 0}
}

}

/* hover */
.gif-float:hover{

}

}

<!-- ===== REGISTER WRAPPER ===== -->
<div class="register-wrapper">

<!-- ===== ACCOUNT REGISTER ===== -->
<div class="register-box" id="accountBox">

  <!-- FORM ĐĂNG KÝ -->
  <div id="accBox">
    <h3>👤 Đăng ký tài khoản</h3>

    <input id="accGame" placeholder="Tên trong game">
    <input id="accDiscord" placeholder="Discord (user#1234)">

    <div class="stage-box">
  <label for="accStage">🎯 Chọn Stage</label>

  <select id="accStage">
    <option value="">-- Chọn Stage --</option>
    <option value="3 High">🔥 3 High</option>
    <option value="2 Low">❄️ 2 Low</option>
    <option value="2 Mid">⚡ 2 Mid</option>
    <option value="2 High">💎 2 High</option>
  </select>
</div>

    <button onclick="registerAccount()">✅ Đăng ký</button>
  </div>

  <!-- USER INFO -->
  <div id="userInfo" style="display:none">
    <h3>✅ Tài khoản</h3>
    <p>🎮 <b id="showGame"></b></p>
    <p>💬 <b id="showDiscord"></b></p>
    <p>🎯 <b id="showStage"></b></p>
    <button onclick="logout()" style="background:#ef4444">🚪 Đăng xuất</button>
  </div>

</div>

  <!-- ===== MATCH BOX (RIGHT) ===== -->
  <div class="register-box">

    <h3>🏆 Đăng ký thi đấu</h3>
    <p id="matchStatus">⛔ Chưa đăng nhập</p>

    <button id="matchBtn" onclick="registerMatch()">
      🚀 Đăng ký thi đấu
    </button>

    <div id="historyBox" style="display:none;margin-top:10px">
      <h4>📋 Lịch sử</h4>
      <ul id="historyList"></ul>
    </div>

  </div>

</div>
<script>
/* ===== CONFIG ===== */
const ACC_WEBHOOK_URL   = "https://discordapp.com/api/webhooks/1477274176841846957/69h52lIfkTobx6cq5nQMYcZ-wn7xMQDC2Q9xsjfKCxd2cwUl0EH0LW9HXDRm0aoVojO6";
const MATCH_WEBHOOK_URL = "LINK_WEBHOOK_MATCH";
const COOLDOWN = 60000;
const ALLOWED_STAGE = ["3 High","2 Low","2 Mid","2 High"];

/* ===== LOAD UI ===== */
function loadUI(){
  const acc = JSON.parse(localStorage.getItem("account"));
  const done = localStorage.getItem("matchRegistered");
  const history = JSON.parse(localStorage.getItem("matchHistory")) || [];

  if(acc){
    accBox.style.display="none";
    userInfo.style.display="block";

    showGame.innerText = acc.game;
    showDiscord.innerText = acc.discord;
    showStage.innerText = acc.stage;

    matchStatus.innerHTML = done
      ? "🟢 <b>Đã đăng ký thi đấu</b>"
      : "🟡 Sẵn sàng đăng ký";

    matchBtn.disabled = !!done;
    matchBtn.innerText = done ? "✔ Đã đăng ký" : "🚀 Đăng ký thi đấu";

    if(history.length){
      historyBox.style.display="block";
      historyList.innerHTML = history.map(h=>`<li>${h}</li>`).join("");
    }
  }
}
loadUI();

/* ===== REGISTER ACCOUNT (FIXED) ===== */
function registerAccount(){
  const game = accGame.value.trim();
  const discord = accDiscord.value.trim();
  const stage = accStage.value;

  if(!game || !discord || !stage){
    alert("❌ Nhập đầy đủ thông tin");
    return;
  }

  if(!ALLOWED_STAGE.includes(stage)){
    alert("❌ Stage không hợp lệ");
    return;
  }

  const time = new Date().toLocaleString();

  // LƯU ACCOUNT
  localStorage.setItem("account", JSON.stringify({
    game,
    discord,
    stage
  }));

  // 👉 BOT ĐĂNG KÝ ACC
  fetch(ACC_WEBHOOK_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      content:
`👤 **ĐĂNG KÝ TÀI KHOẢN**
🎮 Game: **${game}**
💬 Discord: **${discord}**
🎯 Stage: **${stage}**
⏰ ${time}`
    })
  }).catch(err=>console.error(err));

  loadUI();
}

/* ===== LOGOUT ===== */
function logout(){
  localStorage.clear();
  location.reload();
}

/* ===== REGISTER MATCH (GIỮ LOGIC CŨ) ===== */
function registerMatch(){
  const acc = JSON.parse(localStorage.getItem("account"));
  if(!acc){
    alert("❌ Chưa đăng ký tài khoản");
    return;
  }

  if(localStorage.getItem("matchRegistered")){
    alert("❌ Đã đăng ký rồi");
    return;
  }

  const last = localStorage.getItem("lastMatchTime");
  if(last && Date.now()-last < COOLDOWN){
    alert("⏳ Chờ thêm chút nhé");
    return;
  }

  const time = new Date().toLocaleString();

  fetch(MATCH_WEBHOOK_URL,{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({
      content:
`🏆 **ĐĂNG KÝ THI ĐẤU**
🎮 Game: **${acc.game}**
💬 Discord: **${acc.discord}**
🎯 Stage: **${acc.stage}**
⏰ ${time}`
    })
  }).then(()=>{
    localStorage.setItem("matchRegistered","true");
    localStorage.setItem("lastMatchTime",Date.now());

    const h = JSON.parse(localStorage.getItem("matchHistory")) || [];
    h.push("🏆 " + time);
    localStorage.setItem("matchHistory",JSON.stringify(h));

    location.reload();
  });
}
</script>
