<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>SenselessFish | Trang chủ</title>

<style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:linear-gradient(135deg,#0B3C5D,#328CC1,#0B3C5D);
    background-size:400% 400%;
    animation:bgMove 15s ease infinite;
    color:white;
}
@keyframes bgMove{
    0%{background-position:0% 50%}
    50%{background-position:100% 50%}
    100%{background-position:0% 50%}
}

/* ===== HEADER ===== */
.header{
    position:relative;
    height:260px;
    background:url("images/banner1.jpg") center/cover no-repeat;
    box-shadow:0 20px 40px rgba(0,0,0,.6);
}

/* ICON CLAN */
.clan-icon{
    position:absolute;
    top:20px;
    left:20px;
    width:70px;
    height:70px;
    border-radius:14px;
    background:url("images/Senselessfish.png") center/cover no-repeat;
    cursor:pointer;
    box-shadow:0 0 20px rgba(255,255,255,.6);
    transition:.3s;
}
.clan-icon:hover{
    transform:scale(1.1);
}

/* TITLE */
.header-title{
    position:absolute;
    bottom:25px;
    left:30px;
}
.header-title h1{
    margin:0;
    font-size:46px;
    font-weight:900;
    letter-spacing:2px;
}
.header-title p{
    margin-top:6px;
    opacity:.85;
}

/* ===== BUTTON ===== */
.btn{
    padding:14px 30px;
    border:none;
    border-radius:8px;
    background:#1464A0;
    color:white;
    cursor:pointer;
    transition:.2s;
    font-size:15px;
}
.btn:hover{
    transform:scale(1.07);
    box-shadow:0 0 15px #00eaff;
}

/* BUTTON BAR */
.top-btn-bar{
    display:flex;
    justify-content:center;
    gap:20px;
    margin:30px 0;
}

/* ===== CONTENT ===== */
.content{
    width:85%;
    margin:0 auto 60px;
}

/* SECTION */
.section{
    background:linear-gradient(180deg,#0c2236,#091a2b);
    border-radius:22px;
    padding:30px 28px;
    margin-top:30px;
    box-shadow:0 20px 40px rgba(0,0,0,.55);
}

/* IMAGE BLOCK */
.section-img{
    width:100%;
    height:220px;
    border-radius:18px;
    background:url("images/banner2.jpg") center/cover no-repeat;
    margin-bottom:20px;
}

/* TEXT */
.section h2{
    margin-top:0;
}
.section p{
    line-height:1.7;
    opacity:.9;
}
/* TIÊU ĐỀ SENSELESSFISH */
.header-title h1 {
    font-size: 48px; /* chỉnh nếu cần */
    font-weight: 900;
    background: linear-gradient(90deg, #2facff, #2493dd, #2f82ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* DÒNG THE STRONGEST BATTLEGROUND COMMUNITY */
.header-title p {
    font-size: 16px;
    font-weight: 600;
    background: linear-gradient(90deg, #00c6ff, #0072ff, #202da3);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}
</style>
</head>

<body>

<!-- ===== HEADER ===== -->
<div class="header">
    <!-- ICON → QUAY VỀ TRANG CHỦ -->
    <div class="clan-icon" onclick="location.href='index.html'"></div>

    <div class="header-title">
        <h1>SENSELESSFISH</h1>
        <p>The Strongest Battleground Community</p>
    </div>
</div>

<!-- ===== BUTTONS ===== -->
<div class="top-btn-bar">
    <button class="btn" onclick="location.href='staff.html'">Staff Clan</button>
    <button class="btn" onclick="location.href='top.html'">Top Clan</button>
    <button class="btn" onclick="location.href='about.html'">Giới thiệu</button>
</div>

<!-- ===== CONTENT ===== -->
<div class="content">

    <!-- SECTION: CẤP ĐỘ -->
    <div class="section">
        <div class="section-img"></div>
        <h2>⚔️ Hệ thống cấp bậc sức mạnh</h2>
        <p>
            Đây là hệ thống phân chia cấp bậc trình độ trong cộng đồng SenselessFish.
            Hệ thống giúp người chơi nhận biết được thực lực của bản thân cũng như
            đánh giá sức mạnh của các thành viên khác trong clan.
        </p>
    </div>

</div>

</body>
</html>
